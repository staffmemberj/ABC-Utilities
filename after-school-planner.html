                                  <td className={`p-4 print:p-1.5 align-top bg-white ${!isLast ? 'border-b-2 border-gray-500 print-border-b-2' : ''}`}>
                                    
                                    <div className="font-black text-xl print:text-[13px] text-black break-words mb-2 print:mb-1">
                                      {selectedAct ? (
                                        <>
                                          {selectedAct.name}
                                          {currentCount === 1 && selectedAct.min >= 2 && (
                                            <span className="text-sm print:text-[10px] text-gray-600 print-text-black font-bold ml-2 print:ml-1">
                                              (Teacher acts as a student)
                                            </span>
                                          )}
                                        </>
                                      ) : 'No activity selected'}
                                    </div>
                                    
                                    {/* Inline Goals, Materials, and Description */}
                                    {selectedAct && (
                                      <div className="flex flex-col gap-1.5 print:gap-1.5 mt-1 print:mt-1">
                                        <div className="flex gap-1.5 print:gap-1.5">
                                          <div className="flex-1 bg-white print:bg-white p-2 print:p-1.5 rounded border border-gray-300 print-border-1 flex flex-col gap-1 print:gap-[3px] justify-start">
                                            <div className="text-xs print:text-[8px] font-bold text-gray-500 print-text-black uppercase tracking-wider">Goal</div>
                                            <div className="text-sm print:text-[9.5px] text-gray-800 print-text-black font-medium leading-snug">{selectedAct.goal || 'None'}</div>
                                          </div>
                                          <div className="flex-1 bg-white print:bg-white p-2 print:p-1.5 rounded border border-gray-300 print-border-1 flex flex-col gap-1 print:gap-[3px] justify-start">
                                            <div className="text-xs print:text-[8px] font-bold text-gray-500 print-text-black uppercase tracking-wider">Materials</div>
                                            <div className="text-sm print:text-[9.5px] text-gray-800 print-text-black font-medium leading-snug">
                                              {selectedAct.materials ? formatDescription(selectedAct.materials, currentTargets) : 'None'}
                                            </div>
                                          </div>
                                        </div>
                                        {selectedAct.description && (
                                          <div className="bg-white print:bg-white p-2 print:p-1.5 rounded border border-gray-300 print-border-1 flex flex-col gap-1 print:gap-[3px] justify-start">
                                            <div className="text-xs print:text-[8px] font-bold text-gray-500 print-text-black uppercase tracking-wider">Description / Mechanics</div>
                                            <div className="text-base print:text-[9.5px] text-gray-800 print-text-black font-medium leading-snug whitespace-normal break-words">
                                              {formatDescription(selectedAct.description, currentTargets)}
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  );
                })}
              </div>

            </>
          )}

          {/* REPOSITORY TAB */}
          {activeTab === 'repository' && (
            <div className="max-w-7xl mx-auto flex flex-col gap-6 no-print">
              <div className="bg-white shadow-md rounded-xl border border-gray-200 p-6">
                <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><DatabaseIcon className="w-5 h-5 text-blue-600"/> Add Activity to Database</h2>
                <form onSubmit={handleAddActivity} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4 items-start">
                  <div className="lg:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Name</label>
                    <input required type="text" value={newAct.name} onChange={e => setNewAct({...newAct, name: e.target.value})} className="w-full p-2 border rounded-md text-sm bg-gray-50" />
                  </div>
                  <div className="lg:col-span-1">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Category</label>
                    <select value={newAct.category} onChange={e => setNewAct({...newAct, category: e.target.value})} className="w-full p-2 border rounded-md text-sm bg-gray-50">
                      {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                    </select>
                  </div>
                  <div className="lg:col-span-1">
                    <label className="block text-[10px] font-bold text-gray-600 mb-1 leading-tight">Focus</label>
                    <select value={newAct.focus} onChange={e => setNewAct({...newAct, focus: e.target.value})} className="w-full p-2 border rounded-md text-sm bg-gray-50">
                      <option value="Both">Both</option>
                      <option value="Conversation">Conversation</option>
                      <option value="Literacy">Literacy</option>
                    </select>
                  </div>
                  <div className="lg:col-span-1 grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[10px] font-bold text-gray-600 mb-1 leading-tight">Min. Students</label>
                      <input type="number" min="1" max="12" value={newAct.min} onChange={e => setNewAct({...newAct, min: Number(e.target.value)})} className="w-full p-2 border rounded-md text-sm bg-gray-50" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-gray-600 mb-1 leading-tight">Max. Students</label>
                      <input type="number" min="1" max="12" value={newAct.max} onChange={e => setNewAct({...newAct, max: Number(e.target.value)})} className="w-full p-2 border rounded-md text-sm bg-gray-50" />
                    </div>
                  </div>
                  <div className="lg:col-span-1">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Unit Tag</label>
                    <input type="text" value={newAct.unit} onChange={e => setNewAct({...newAct, unit: e.target.value})} placeholder="e.g. all, lb1-1" className="w-full p-2 border rounded-md text-sm bg-gray-50" />
                  </div>
                  <div className="lg:col-span-6 border-t border-gray-100 pt-4"></div>
                  <div className="lg:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Materials</label>
                    <input type="text" value={newAct.materials} onChange={e => setNewAct({...newAct, materials: e.target.value})} placeholder="(Leave blank for None)" className="w-full p-2 border rounded-md text-sm bg-gray-50" />
                  </div>
                  <div className="lg:col-span-4">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Goal</label>
                    <input type="text" value={newAct.goal} onChange={e => setNewAct({...newAct, goal: e.target.value})} className="w-full p-2 border rounded-md text-sm bg-gray-50" />
                  </div>
                  <div className="lg:col-span-6">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Description / Mechanics</label>
                    <textarea rows="2" value={newAct.description} onChange={e => setNewAct({...newAct, description: e.target.value})} className="w-full p-2 border rounded-md text-sm bg-gray-50 resize-y" placeholder="Brief instructions for the teacher..."></textarea>
                  </div>
                  
                  <div className="lg:col-span-6 flex justify-end">
                    <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-md text-sm font-bold hover:bg-blue-700">Add to Repository</button>
                  </div>
                </form>
              </div>

              <div className="bg-white shadow-md rounded-xl border border-gray-200 overflow-hidden">
                <div className="bg-gray-50 border-b border-gray-200 p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <h3 className="font-bold text-gray-800 text-lg">Saved Activities ({filteredRepository.length})</h3>
                  <div className="relative w-full sm:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <SearchIcon className="w-4 h-4 text-gray-400" />
                    </div>
                    <input 
                      type="text" 
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      placeholder="Search repository..." 
                      className="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-900"
                    />
                  </div>
                </div>
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-gray-100">
                      <th className="p-3 border-b text-sm font-bold text-gray-600">Name / Mechanics</th>
                      <th className="p-3 border-b text-sm font-bold text-gray-600">Category</th>
                      <th className="p-3 border-b text-sm font-bold text-gray-600">Capacity</th>
                      <th className="p-3 border-b text-sm font-bold text-gray-600">Materials</th>
                      <th className="p-3 border-b text-sm font-bold text-gray-600">Goal</th>
                      <th className="p-3 border-b w-16 text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredRepository.length > 0 ? (
                      filteredRepository.map(act => (
                        <tr key={act.id} className="hover:bg-gray-50 border-b">
                          <td className="p-3">
                            <div className="text-sm font-bold text-gray-800">{act.name}</div>
                            <div className="text-[11px] text-gray-500 mt-1 line-clamp-2" title={act.description}>{act.description || '-'}</div>
                          </td>
                          <td className="p-3">
                            <div className="flex flex-col gap-1 items-start">
                              <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap">{act.category}</span>
                              <span className={`px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap
                                ${act.focus === 'Conversation' ? 'bg-green-100 text-green-800' : 
                                  act.focus === 'Literacy' ? 'bg-purple-100 text-purple-800' : 
                                  'bg-gray-200 text-gray-800'}`}>
                                {act.focus}
                              </span>
                            </div>
                          </td>
                          <td className="p-3 text-sm text-gray-600 font-medium whitespace-nowrap">{act.min} - {act.max} students</td>
                          <td className="p-3 text-sm text-gray-600">{act.materials || '-'}</td>
                          <td className="p-3 text-sm text-gray-600">{act.goal || '-'}</td>
                          <td className="p-3 text-center"><button onClick={() => removeActivity(act.id)} className="p-1 text-gray-400 hover:text-red-500"><Trash2Icon className="w-4 h-4" /></button></td>
                        </tr>
                      ))
                    ) : (
                      <tr>
                        <td colSpan="6" className="p-8 text-center text-gray-500 font-bold bg-gray-50">
                          No activities found matching "{searchQuery}"
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
