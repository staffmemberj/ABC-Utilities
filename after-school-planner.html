<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Garden Smart Lesson Planner</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #FAF8F5;
      color: #1f2937;
    }

    @media print {
      @page { 
        size: portrait A4; 
        margin: 8mm 10mm 12mm 10mm;
        @bottom-center {
          content: counter(page) "/" counter(pages);
          font-family: 'Nunito', sans-serif;
          font-size: 10pt;
          font-weight: bold;
          color: black;
        }
      }
      body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      
      /* Specific directional print borders to avoid overlapping/inconsistent thickness */
      .print-border-2 { border: 2px solid black !important; }
      .print-border-b-2 { border-bottom: 2px solid black !important; }
      .print-border-r-2 { border-right: 2px solid black !important; }
      .print-border-1 { border: 1px solid black !important; }
      
      .print-text-black { color: black !important; }
      .print-bg-gray { background-color: #f3f4f6 !important; }
      .print-bg-holiday { background-color: #e5e7eb !important; }
      
      table { table-layout: fixed !important; width: 100% !important; max-width: 100% !important; }
      thead { display: table-header-group; }
      th, td { word-wrap: break-word !important; overflow-wrap: break-word !important; white-space: normal !important; }
      tbody tr:last-child td { border-bottom: none !important; }
      
      tr { page-break-inside: avoid !important; break-inside: avoid !important; }
      
      .print-wrapper { 
        border-radius: 0.75rem !important; 
        -webkit-box-decoration-break: clone !important; 
        box-decoration-break: clone !important; 
        margin-bottom: 2mm !important;
      }
      .print-break-after { page-break-after: always !important; break-after: page !important; }
      .print-avoid-break { page-break-inside: avoid !important; break-inside: avoid !important; }
      
      .shadow-sm, .shadow-md { box-shadow: none !important; }
      
      select, input[type="text"], textarea {
        appearance: none;
        -webkit-appearance: none;
        border: none !important;
        background: transparent !important;
        color: black !important;
        padding: 0 !important;
        font-weight: bold;
        width: 100%;
        white-space: normal;
      }
      input::placeholder, textarea::placeholder { color: transparent !important; }
      
      /* Hide scrollbars for the horizontal lists */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

    // --- ICONS ---
    const CalendarIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>;

    const PrinterIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>;

    const ShuffleIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 3 21 3 21 8"/><line x1="4" x2="21" y1="20" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" x2="21" y1="15" y2="21"/><line x1="4" x2="9" y1="4" y2="9"/></svg>;

    const Trash2Icon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const BookIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const ZapIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const PlusCircleIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>;
    const PalmtreeIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M13 8c0-2.76-2.46-5-5.5-5S2 5.24 2 8h2l1-1 1 1h4"/><path d="M13 7.14A5.82 5.82 0 0 1 16.5 6c3.04 0 5.5 2.24 5.5 5h-3l-1-1-1 1h-3"/><path d="M5.89 9.71c-2.15 2.15-2.3 5.47-.35 7.43l4.24-4.25.7-.7.71-.71 2.12-2.12c-1.95-1.96-5.27-1.8-7.42.35z"/><path d="M11 15.5c.5 2.5-.17 4.5-1 6.5h4c2-5.5-.5-12-1-14"/></svg>;
    const SearchIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const ClipboardListIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
    const UserPlusIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;

    // --- DYNAMIC TEXT FORMATTER ---
    const formatDescription = (desc, targets) => {
      if (!desc) return '';
      let formatted = desc;
      const v = targets.vocab ? `"${targets.vocab}"` : '[Target Vocab]';
      const s = targets.sentences ? `"${targets.sentences}"` : '[Target Sentences]';
      const p = targets.phonics ? `"${targets.phonics}"` : '[Target Phonics]';
      formatted = formatted.replace(/\{\{vocab\}\}/gi, v);
      formatted = formatted.replace(/\{\{sentence\}\}/gi, s);
      formatted = formatted.replace(/\{\{phonics\}\}/gi, p);
      return formatted;
    };

    const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    const categories = ['Warm-up', 'Song/Chant', 'Conversation', 'Vocabulary', 'Structure', 'Phonics', 'Desk Work', 'Wrap-up'];

    // --- CALENDAR SYSTEM HELPERS ---
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const getWeeksForMonth = (year, month) => {
        const w = [];
        const firstDay = new Date(year, month, 1);
        let dayOfWeek = firstDay.getDay(); 
        let offset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek; 
        let currentMonday = new Date(year, month, 1 + offset);
        
        for (let i = 0; i < 6; i++) {
            const mon = new Date(currentMonday);
            const tue = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate() + 1);
            const wed = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate() + 2);
            const thu = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate() + 3);
            const fri = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate() + 4);
            
            if (mon.getMonth() === month || tue.getMonth() === month || wed.getMonth() === month || thu.getMonth() === month || fri.getMonth() === month) {
                w.push({
                    label: `${mon.getMonth()+1}/${mon.getDate()} - ${fri.getMonth()+1}/${fri.getDate()}`,
                    dates: { 'Monday': mon, 'Tuesday': tue, 'Wednesday': wed, 'Thursday': thu, 'Friday': fri }
                });
            }
            currentMonday.setDate(currentMonday.getDate() + 7);
        }
        return w;
    };

    const formatDateForHeader = (date) => {
        if (!date) return '';
        const nth = (d) => {
            if (d > 3 && d < 21) return 'th';
            switch (d % 10) {
                case 1:  return "st"; case 2:  return "nd"; case 3:  return "rd"; default: return "th";
            }
        };
        return `${monthNames[date.getMonth()]} ${date.getDate()}${nth(date.getDate())}, ${date.getFullYear()}`;
    };

    const displayShortDate = (date) => {
        if (!date) return '';
        return `${date.getMonth() + 1}/${date.getDate()}`;
    };

    // --- CURRICULUM LOGIC ---
    const programConfig = {
      fun: {
        name: 'Fun English',
        duration: 'Speaking & Listening (50 min)',
        blocks: [
          { id: 'f1', label: 'Warm-up & Review (5m)', allowedTypes: ['Warm-up'] },
          { id: 'f2', label: 'Model: Present Targets (15m)', allowedTypes: ['Vocabulary', 'Structure'] },
          { id: 'f3', label: 'Action: Class Drills (10m)', allowedTypes: ['Vocabulary', 'Structure'] },
          { id: 'f4', label: 'Talk: Pair/Group Work (15m)', allowedTypes: ['Conversation'] },
          { id: 'f5', label: 'Song & Wrap-up (5m)', allowedTypes: ['Song/Chant', 'Wrap-up'] }
        ]
      },
      step: {
        name: 'Step English',
        duration: 'Reading & Writing Focus (50 min)',
        blocks: [
          { id: 's1', label: 'Warm-up & Review (5m)', allowedTypes: ['Warm-up'] },
          { id: 's2', label: 'Model: Phonics/Vocab (15m)', allowedTypes: ['Phonics', 'Vocabulary'] },
          { id: 's3', label: 'Action: Drills (10m)', allowedTypes: ['Structure', 'Phonics'] },
          { id: 's4', label: 'Desk Work & Reading (15m)', allowedTypes: ['Desk Work'] },
          { id: 's5', label: 'Wrap-up (5m)', allowedTypes: ['Wrap-up'] }
        ]
      }
    };

    // --- FULL DATABASE OF LESSONS ---
    const curriculumSets = {
      "lb1": {
        name: "Let's Begin 1",
        units: [
          { id: 1, vocab: "Andy, ant, alligator, apple", sentences: "Hi, Andy! Hello!", phonics: "Aa" },
          { id: 2, vocab: "Andy, ant, alligator, apple", sentences: "What's your name? I'm Eddie.", phonics: "Aa" },
          { id: 3, vocab: "Eddie, elbow, egg, elephant, Isabel, ink, igloo, insect", sentences: "Hi! How are you? I'm fine.", phonics: "Ee, Ii" },
          { id: 4, vocab: "Oliver, octopus, omelet, ostrich, book, ball, jump rope, doll", sentences: "What is it? It's a ball.", phonics: "Oo" },
          { id: 5, vocab: "Uncle Jim, umpire, umbrella, upside down, balloon, bicycle, cap, bat", sentences: "What is it? It's a balloon.", phonics: "Uu" },
          { id: 6, vocab: "Carol, car, cat, candy, 1, 2, 3, 4, 5", sentences: "Let's count! OK! 1!", phonics: "Cc" },
          { id: 7, vocab: "Gail, girl, gorilla, game, 6, 7, 8, 9, 10", sentences: "Let's count! OK! 6!", phonics: "Gg" },
          { id: 8, vocab: "Beth, boy, bird, bag", sentences: "How many? 7!", phonics: "Bb" },
          { id: 9, vocab: "boy, bird, bag, car, cat, candy, girl, gorilla, game", sentences: "How old are you? I'm 7.", phonics: "Bb, Cc, Gg Review" },
          { id: 10, vocab: "David, dog, desk, dinosaur, Peter, peach, pencil, picture, eggs, pencils, pictures, peaches", sentences: "What are they? They're eggs. (Plurals)", phonics: "Dd, Pp" },
          { id: 11, vocab: "Tom, table, telephone, TV, cars, apples, dinosaurs, books", sentences: "What are they? They're cars. (Plurals)", phonics: "Tt" },
          { id: 12, vocab: "Vicky, volcano, vest, violin, red, blue, yellow, green, orange", sentences: "What color is it? It's blue.", phonics: "Vv" },
          { id: 13, vocab: "Zack, zebra, zero, zipper, pink, purple, black, brown, white", sentences: "What color is it? It's purple.", phonics: "Zz" },
          { id: 14, vocab: "Fay, finger, foot, fan, circle, square, triangle, rectangle", sentences: "What shape is it? It's a circle.", phonics: "Ff" },
          { id: 15, vocab: "Luke, lamb, lemon, lion, star, diamond, heart, oval", sentences: "What shape is it? It's a star.", phonics: "Ll" },
          { id: 16, vocab: "Mary, moon, man, monkey", sentences: "Good morning! Good night!", phonics: "Mm" },
          { id: 17, vocab: "Nina, nut, notebook, nest", sentences: "Thank you! You're welcome.", phonics: "Nn" },
          { id: 18, vocab: "Scott, sandwich, seesaw, sun, body, head, face, mouth", sentences: "This is my body.", phonics: "Ss" },
          { id: 19, vocab: "Mr. X, X-ray, box, fox, eyes, ears, nose, fingers", sentences: "These are my eyes. This is my nose.", phonics: "Xx" },
          { id: 20, vocab: "Jenny, jam, juice, jet, arms, hands, legs, feet", sentences: "These are my arms.", phonics: "Jj" },
          { id: 21, vocab: "Kate, kitten, kite, kangaroo, left, right, hand, foot", sentences: "This is my left hand. This is my right foot.", phonics: "Kk" },
          { id: 22, vocab: "Henry, hat, horse, house, shoulders, elbows, knees, toes", sentences: "Touch your shoulders.", phonics: "Hh" },

          { id: 25, vocab: "Wendy, water, watch, woman, run, skip, walk, jump", sentences: "I can run.", phonics: "Ww" },
          { id: 26, vocab: "Yolanda, yak, yarn, yo-yo, swim, hop, dance, sing", sentences: "I can swim.", phonics: "Yy" },
          { id: 27, vocab: "Alphabet Review (Aa-Zz)", sentences: "Goodbye! See you later!", phonics: "Aa-Zz" },
          { id: 28, vocab: "Alphabet Review (Aa-Zz)", sentences: "Goodbye! See you later!", phonics: "Aa-Zz" }
        ]
      },
      "lb2": {
        name: "Let's Begin 2",
        units: [
          { id: 1, vocab: "ball, jump rope, yo-yo, bicycle, train, car, doll, teddy bear, apple, ant, bird, cat, dog", sentences: "What's your name? I'm Kate. / What is it? It's a yo-yo.", phonics: "Aa-Dd" },
          { id: 2, vocab: "red, blue, yellow, green, brown, purple, orange, pink, black, white, egg, elephant, fish, farm, gorilla, goat, heart, house", sentences: "Hi, boys and girls. / What color is it? It's purple.", phonics: "Ee-Hh" },
          { id: 3, vocab: "circle, square, triangle, heart, star, diamond, oval, rectangle, igloo, iguana, jump rope, jeans, kangaroo, kite, lion, ladybug", sentences: "How are you today? I'm fine. / Is it a star? Yes, it is.", phonics: "Ii-Ll" },
          { id: 4, vocab: "Numbers 1-10, moon, monkey, nest, net, octopus, ostrich, panda, popcorn", sentences: "May I come in? Sure! / How many cats? 6 cats.", phonics: "Mm-Pp" },
          { id: 5, vocab: "dog, cat, bird, cow, rabbit, duck, (plurals), queen, quilt, rock, sun, sandwich, tiger, teapot", sentences: "Here you are. Thank you. / How many cows? 8 cows.", phonics: "Qq-Tt" },
          { id: 6, vocab: "ice cream, pizza, cake, chicken, milk, fish, bread, rice, umbrella, up, violin, vest, watch, water", sentences: "How old are you? I'm 6. / Do you like fish? Yes, I do.", phonics: "Uu-Ww" },
          { id: 7, vocab: "head, shoulders, knees, toes, eyes, ears, mouth, nose, fox, box, yarn, yak, zebra, zero", sentences: "Oops! I'm sorry! That's OK. / What can you do? I can touch my eyes.", phonics: "Xx-Zz" },
          { id: 8, vocab: "ride a bicycle, sing a song, fly a kite, bounce a ball, swim, smile, wink, dance", sentences: "Let's play. OK. / Can you dance? Yes, I can.", phonics: "Aa-Zz Review" }
        ]
      }
    };

    // --- 70+ DRILLS & GAMES REPOSITORY ---
    const initialRepository = [
      // WARM-UPS
      { id: 'wu2', name: 'Six-Second Drill', category: 'Warm-up', focus: 'Conversation', min: 1, max: 12, unit: 'all', materials: 'None', goal: 'Fast-paced repetition and focus.', description: 'Model a sentence 3 times. Have students repeat it 3 times quickly, then raise their hands and yell "Finished!". Add actions (e.g., tap head, stand up).' },
      { id: 'wu3', name: '1, 2, 3, Finished!', category: 'Warm-up', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Speed drilling in pairs.', description: 'Pairs take turns asking and answering a target question. The first pair to ask and answer 3 questions sits down and shouts "Finished!".' },
      { id: 'wu4', name: 'Command Chain', category: 'Warm-up', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Listen and do actions.', description: 'Students sit in a circle. S1 says and does an action. S2 repeats S1\'s action and adds a new one. Continue the chain.' },
      { id: 'wu5', name: 'Do It!', category: 'Warm-up', focus: 'Conversation', min: 1, max: 12, unit: 'all', materials: 'None', goal: 'Action and numbers review.', description: 'Give a command and a number (1-10). Students do the action and say it that many times. (e.g., "Jump 3 times!" -> "Jump, jump, jump!")' },
      { id: 'wu6', name: 'Follow the Leader', category: 'Warm-up', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Physical response to verbs.', description: 'A student leader says a sentence "I can (touch my ears)". Students repeat and do the action. The leader strings 3 actions together.' },
      { id: 'wu7', name: 'Please', category: 'Warm-up', focus: 'Conversation', min: 1, max: 12, unit: 'all', materials: 'None', goal: 'Listening discrimination.', description: 'Give commands at random. If you say "Please" before the command, students do it. If you don\'t say "Please", they must freeze.' },
      { id: 'wu8', name: 'Rhythm Circle', category: 'Warm-up', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Cadence and vocabulary recall.', description: 'Slap hands on knees twice, clap twice. Keep the rhythm while going around the circle saying target vocabulary words.' },
      { id: 'wu9', name: 'Alphabet Flash', category: 'Warm-up', focus: 'Literacy', min: 1, max: 12, unit: 'all', materials: 'Letter Cards', goal: 'Quick letter recall.', description: 'Quickly flash letter cards. The class must shout the letter name and sound as fast as possible.' },

      // SONGS / CHANTS
      { id: 'sc1', name: 'Target Unit Chant', category: 'Song/Chant', focus: 'Both', min: 1, max: 12, unit: 'all', materials: 'Tablet (Audio/Video - Lesson Chant)', goal: 'Phonemic awareness and rhythm.', description: 'Play the unit\'s phonics chant on the tablet. Model the gestures and have students chant along while clapping to keep the beat.' },
      { id: 'sc2', name: 'The Alphabet Song', category: 'Song/Chant', focus: 'Literacy', min: 1, max: 12, unit: 'all', materials: 'Tablet (Audio/Video - Alphabet Song)', goal: 'Alphabet sequence.', description: 'Play the Alphabet Song. Students point to the letters on the board or in their books as they sing along.' },
      { id: 'sc3', name: 'Our Chant', category: 'Song/Chant', focus: 'Conversation', min: 1, max: 12, unit: 'all', materials: 'None', goal: 'Creative rhythm practice.', description: 'Start a basic rhythm (tap, tap, clap). Have students fit the target dialogue or vocabulary into the beat with appropriate actions.' },

      // CONVERSATION
      { id: 'c1', name: 'Conversation Lines', category: 'Conversation', focus: 'Conversation', min: 4, max: 12, unit: 'all', materials: 'None', goal: 'One-on-one dialogue practice.', description: 'Two parallel lines facing each other. Partners practice the Q&A. One line shifts to the right so everyone gets a new partner. Repeat.' },
      { id: 'c2', name: 'Step Away Lines', category: 'Conversation', focus: 'Conversation', min: 4, max: 12, unit: 'all', materials: 'None', goal: 'Volume and confidence building.', description: 'Partners face each other in lines. They ask/answer the target question. Once successful, they take one giant step back and repeat, speaking louder each time.' },
      { id: 'c3', name: 'Beanbag Circle', category: 'Conversation', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Beanbag', goal: 'Listen and respond to questions.', description: 'Students sit in a circle. Ask a question and toss the beanbag to a student. They answer, ask the same question, and toss it to someone else.' },
      { id: 'c4', name: 'Build a Conversation', category: 'Conversation', focus: 'Literacy', min: 2, max: 12, unit: 'all', materials: 'Whiteboard, Markers', goal: 'Natural conversation flow.', description: 'Write the first line of a conversation on the board. Ask students what the next line could be. Build the full dialogue together and role-play it.' },
      { id: 'c5', name: 'Dialogue Musical Chairs', category: 'Conversation', focus: 'Conversation', min: 4, max: 12, unit: 'all', materials: 'Tablet (Audio/Video - Background Music), Chairs', goal: 'Dynamic dialogue mixing.', description: 'Play music. Students walk around. When music stops, they sit. The student without a chair is out. Or, remove two chairs, and the two standing must say a dialogue together.' },
      { id: 'c6', name: 'Role Play', category: 'Conversation', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Real-world application.', description: 'Using language students have learned, create an original conversation. Students practice in pairs and perform for the class using dramatic voices.' },

      { id: 'v1', name: 'Find the Hidden Object', category: 'Vocabulary', focus: 'Conversation', min: 1, max: 12, unit: 'all', materials: 'Student Books or Posters', goal: 'Target word recognition.', description: 'Ask students "Is there a [target object]?" or "Find the hidden [object]". Students look at their book/poster, point, and answer "Yes, there is."' },
      { id: 'v2', name: 'Slap (Pictures)', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Picture Cards', goal: 'Fast visual recognition.', description: 'Spread picture cards face up. The caller yells a word. Students race to be the first to slap the correct card and say the word.' },
      { id: 'v2b', name: 'Slap (Words)', category: 'Vocabulary', focus: 'Literacy', min: 2, max: 12, unit: 'all', materials: 'Word Cards', goal: 'Reading speed.', description: 'Spread word cards face up. Yell a word. Students race to read and slap the correct word card.' },
      { id: 'v3', name: 'Bingo (Pictures)', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Student Cards', goal: 'Vocabulary memorization.', description: 'Students arrange 9 picture cards in a 3x3 grid. Call out words. Students flip matching cards. First to get 3 in a row wins.' },
      { id: 'v3b', name: 'Bingo (Words)', category: 'Vocabulary', focus: 'Literacy', min: 2, max: 12, unit: 'all', materials: 'Word Bingo Cards', goal: 'Reading recognition.', description: 'Students use cards with written words. Call out words. First to get 3 in a row wins.' },
      { id: 'v4', name: 'Charades', category: 'Vocabulary', focus: 'Conversation', min: 3, max: 12, unit: 'all', materials: 'None', goal: 'Express meaning via gestures.', description: 'Whisper a word to a student. They must act it out using gestures without speaking while the rest of the class guesses the word.' },
      { id: 'v5', name: 'Concentration (Pictures)', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: '2 sets of Student Cards', goal: 'Memory and matching.', description: 'Place two identical sets of picture cards face down. Students turn over two at a time, saying the words. If they match, they keep the pair.' },
      { id: 'v5b', name: 'Concentration (Word & Picture)', category: 'Vocabulary', focus: 'Literacy', min: 2, max: 12, unit: 'all', materials: 'Word Cards, Picture Cards', goal: 'Reading and matching.', description: 'Place word cards and picture cards face down. Students turn over one of each to find the matching reading pair.' },
      { id: 'v6', name: 'Guessing Game', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Handkerchief, Real Objects', goal: 'Deduction and recall.', description: 'Place an object under a handkerchief or in a bag. Students guess what it is using target vocab. Correct guesses win a point.' },
      { id: 'v7', name: 'Hidden Pictures', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Teacher Cards, Number Cards', goal: 'Quick recall.', description: 'Cover 10 Picture Cards with Number Cards. A student chooses a number. Reveal the picture for 3 seconds. If they name it, they win a point.' },
      { id: 'v8', name: 'Name the Body Part', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Body vocabulary recall.', description: 'Pairs point to their own body parts and name them rapidly. S1 points to head: "Head". S2 points to mouth: "Mouth".' },
      { id: 'v9', name: 'Picture Game', category: 'Vocabulary', focus: 'Conversation', min: 3, max: 12, unit: 'all', materials: 'Whiteboard, Markers', goal: 'Visual vocabulary association.', description: 'Whisper a word to S1. S1 draws the object on the whiteboard. The first student to guess the word correctly wins a point.' },
      { id: 'v10', name: 'Run to a Card', category: 'Vocabulary', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Teacher Cards', goal: 'Physical response to vocab.', description: 'Scatter cards around the room. Say a target word. Students run to touch the appropriate card.' },

      { id: 'p13', name: 'Letter Trace Relay', category: 'Phonics', focus: 'Literacy', min: 4, max: 12, unit: 'all', materials: 'Whiteboard, Markers', goal: 'Tactile letter recognition.', description: 'Trace a letter on the back of the last student in line. They trace it on the next student. The front student runs to the board and writes the letter.' },
      { id: 'p14', name: 'What\'s the Letter?', category: 'Phonics', focus: 'Literacy', min: 4, max: 12, unit: 'all', materials: 'Whiteboard, Markers', goal: 'Initial sound recognition.', description: 'Call out a target word. The first student in the relay races to the board, writes the FIRST letter of that word, and says it.' },
