      { id: 'd2', name: 'Back-to-Back Pictures', category: 'Desk Work', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'Paper, Pencils', goal: 'Communication and listening.', description: 'Partners sit back-to-back. S1 draws a simple picture from your instructions, then describes it to S2. S2 draws it based solely on listening.' },
      { id: 'd3', name: 'File Grids/Screens', category: 'Desk Work', focus: 'Both', min: 2, max: 12, unit: 'all', materials: 'File Folders, Student Cards', goal: 'Coordinate description.', description: 'Pairs sit with a folder screen between them. S1 arranges cards on a 3x3 grid and describes the locations. S2 tries to duplicate the grid by listening.' },
      { id: 'd4', name: 'More Words with...', category: 'Desk Work', focus: 'Literacy', min: 1, max: 12, unit: 'all', materials: 'Paper, Crayons', goal: 'Vocabulary expansion.', description: 'Write a target letter. Have students brainstorm and draw other words they know that start with that letter to make a poster.' },
      { id: 'd5', name: 'Which Letter Is Different?', category: 'Desk Work', focus: 'Literacy', min: 1, max: 12, unit: 'all', materials: 'Worksheets or Whiteboard', goal: 'Visual discrimination.', description: 'Write a target letter, then a row of 4 letters where 1 is slightly different (e.g., b b d b). Students must cross out the different one.' },
      { id: 'd6', name: 'Which Letter Is the Same?', category: 'Desk Work', focus: 'Literacy', min: 1, max: 12, unit: 'all', materials: 'Worksheets or Whiteboard', goal: 'Visual matching.', description: 'Write a target letter, then a row of 4 letters where only 1 matches (e.g., p | d q p b). Students must circle the matching letter.' },
      { id: 'd7', name: 'Pair Dictation', category: 'Desk Work', focus: 'Literacy', min: 2, max: 12, unit: 'all', materials: 'Paper, Pencils', goal: 'Listening and writing.', description: 'S1 dictates an image or letter (e.g., "Number 1 is A"). S2 draws/writes it. Compare papers at the end and reverse roles.' },

      // WRAP-UP
      { id: 'r2', name: 'Hot Potato', category: 'Wrap-up', focus: 'Conversation', min: 3, max: 12, unit: 'all', materials: 'Beanbag or Ball, Tablet (Audio/Video - Background Music)', goal: 'Fun review under pressure.', description: 'Play music on the tablet. Students pass a ball. Stop the music. The student holding the ball must answer a review question.' },
      { id: 'r3', name: 'How Many Steps?', category: 'Wrap-up', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Physical counting.', description: 'Students stand across the room. They ask "How many steps?". You answer "Two big steps". First to reach you is the next teacher.' },
      { id: 'r4', name: 'Stop the Music', category: 'Wrap-up', focus: 'Both', min: 4, max: 12, unit: 'all', materials: 'Tablet (Audio/Video - Background Music), Picture Cards', goal: 'Target mixing.', description: 'Students march to music with a card. Stop the music. They must find a partner, exchange Q&A using their cards, and swap cards.' },
      { id: 'r5', name: 'Rock, Paper, Scissors', category: 'Wrap-up', focus: 'Conversation', min: 2, max: 12, unit: 'all', materials: 'None', goal: 'Quick pair dismissal.', description: 'Students play Rock, Paper, Scissors with the teacher or partner. The loser answers a target question before being allowed to pack up.' },
      { id: 'r6', name: 'Letter/Word Password', category: 'Wrap-up', focus: 'Literacy', min: 1, max: 12, unit: 'all', materials: 'Word/Letter Cards', goal: 'Reading exit ticket.', description: 'Stand at the door. Hold up a letter or word card. Each student must correctly read it as their "password" to leave the room.' }
    ];

    const App = () => {
      const [activeTab, setActiveTab] = useState('planner'); 
      const [activeProgram, setActiveProgram] = useState('both');
      const [activeDay, setActiveDay] = useState('Monday');
      const [selectedBook, setSelectedBook] = useState('lb1');
      const [selectedUnit, setSelectedUnit] = useState(1);

      // --- CALENDAR SYSTEM STATE ---
      const currentYear = new Date().getFullYear();
      const [calYear, setCalYear] = useState(currentYear);
      const [calMonth, setCalMonth] = useState(new Date().getMonth());
      const [calWeek, setCalWeek] = useState(0);

      const weeks = useMemo(() => getWeeksForMonth(calYear, calMonth), [calYear, calMonth]);

      useEffect(() => {
        if (calWeek >= weeks.length) setCalWeek(0);
      }, [weeks, calWeek]);

      const currentWeekDates = weeks[calWeek]?.dates || {};

      // --- ROSTER STATE ---
      const [roster, setRoster] = useState(() => {
        const saved = localStorage.getItem('abc_garden_roster');
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            console.error('Failed to parse roster from local storage', e);
          }
        }
        return [
          { id: generateId(), name: '', schedule: { 'Monday': 'None', 'Tuesday': 'None', 'Wednesday': 'None', 'Thursday': 'None', 'Friday': 'None' } }
        ];
      });

      useEffect(() => {
        localStorage.setItem('abc_garden_roster', JSON.stringify(roster));
      }, [roster]);

      // HOLIDAYS STATE
      const [holidays, setHolidays] = useState({ 'Monday': false, 'Tuesday': false, 'Wednesday': false, 'Thursday': false, 'Friday': false });

      // Get accurate student counts per day based on the roster and program
      const getStudentCount = (day, program) => {
        if (program === 'both') {
          return roster.filter(s => ['fun', 'step', 'Both'].includes(s.schedule[day])).length;
        }
        return roster.filter(s => s.schedule[day] === program || s.schedule[day] === 'Both').length;
      };

      // Determine if a day is completely off
      const isDayOff = (day, program) => {
        if (holidays[day]) return true;
        if (program === 'both') {
          return getStudentCount(day, 'fun') === 0 && getStudentCount(day, 'step') === 0;
        }
        return getStudentCount(day, program) === 0;
      };

      // Targets tracking both programs
      const [targets, setTargets] = useState({
        fun: { vocab: '', sentences: '', phonics: '', book: '', unit: '' },
        step: { vocab: '', sentences: '', phonics: '', book: '', unit: '' }
      });

      const [plans, setPlans] = useState({ fun: {}, step: {} });

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [newAct, setNewAct] = useState({ name: '', category: 'Warm-up', focus: 'Both', min: 1, max: 12, unit: 'all', materials: '', goal: '', description: '' });
      const [repository, setRepository] = useState(initialRepository);
      const [searchQuery, setSearchQuery] = useState('');

      // --- DERIVED PLAN (Auto-fill Logic) ---
      const derivedPlan = useMemo(() => {
        const newPlans = { fun: { ...plans.fun }, step: { ...plans.step } };
        
        ['fun', 'step'].forEach(program => {
           const currentBlocks = programConfig[program].blocks;
           const targetFocus = program === 'fun' ? 'Conversation' : 'Literacy';
           
           weekDays.forEach(day => {
             if (isDayOff(day, program)) return;
             
             const rawCount = getStudentCount(day, program);
             const currentEffectiveCount = rawCount <= 1 ? 2 : rawCount; 

             currentBlocks.forEach(block => {
               const validOptions = repository.filter(a => 
                 block.allowedTypes.includes(a.category) && 
                 currentEffectiveCount >= a.min && currentEffectiveCount <= a.max &&
                 (a.focus === targetFocus || a.focus === 'Both')
               );
               
               if (newPlans[program][`${day}-${block.id}`] && !validOptions.find(o => o.id === newPlans[program][`${day}-${block.id}`])) {
                  newPlans[program][`${day}-${block.id}`] = '';
               }
               if (validOptions.length === 1 && !newPlans[program][`${day}-${block.id}`]) {
                 newPlans[program][`${day}-${block.id}`] = validOptions[0].id;
               }
             });
           });
        });
        return newPlans;
      }, [plans, repository, roster, holidays]);

      useEffect(() => {
        setPlans(prev => {
          const currentPlanStr = JSON.stringify(prev);
          const derivedPlanStr = JSON.stringify(derivedPlan);
          if (currentPlanStr !== derivedPlanStr) {
             return derivedPlan;
          }
          return prev;
        });
      }, [derivedPlan]);

      const handleBookChange = (e) => {
        setSelectedBook(e.target.value);
        setSelectedUnit(1);
      };

      const updatePlan = (prog, day, blockId, activityId) => {
        setPlans(prev => ({
          ...prev,
          [prog]: { ...prev[prog], [`${day}-${blockId}`]: activityId }
        }));
      };

      const updateTarget = (field, value) => {
        const progs = activeProgram === 'both' ? ['fun', 'step'] : [activeProgram];
        setTargets(prev => {
          const next = { ...prev };
          progs.forEach(p => {
            next[p] = { ...next[p], [field]: value };
          });
          return next;
        });
      };

      const generateSet = () => {
        const bookData = curriculumSets[selectedBook];
        const unitData = bookData.units.find(u => u.id === Number(selectedUnit));
        
        if(unitData) {
          const progs = activeProgram === 'both' ? ['fun', 'step'] : [activeProgram];
          setTargets(prev => {
            const next = { ...prev };
            progs.forEach(p => {
              next[p] = {
                vocab: unitData.vocab,
                sentences: unitData.sentences,
                phonics: unitData.phonics,
                book: bookData.name,
                unit: selectedBook === 'lb1' ? `Lesson ${unitData.id}` : `Unit ${unitData.id}`
              };
            });
            return next;
          });
          randomizeWeek(selectedBook, unitData.id);
        }
      };

      const randomizeWeek = (bookPref = null, unitPref = null) => {
        let newPlans = { fun: { ...plans.fun }, step: { ...plans.step } };
        const progsToUpdate = activeProgram === 'both' ? ['fun', 'step'] : [activeProgram];
        
        progsToUpdate.forEach(program => {
            const currentBlocks = programConfig[program].blocks;
            const targetUnitStr = bookPref && unitPref ? `${bookPref}-${unitPref}` : null;
            const targetFocus = program === 'fun' ? 'Conversation' : 'Literacy';

            let usedCategoryIds = {}; 
            categories.forEach(cat => usedCategoryIds[cat] = new Set());

            weekDays.forEach(day => {
              if (isDayOff(day, program)) return;
              
              const rawCount = getStudentCount(day, program);
              const currentEffectiveCount = rawCount <= 1 ? 2 : rawCount;

              currentBlocks.forEach(block => {
                let available = repository.filter(a => 
                  block.allowedTypes.includes(a.category) && 
                  currentEffectiveCount >= a.min && currentEffectiveCount <= a.max &&
                  !usedCategoryIds[a.category].has(a.id) && 
                  (a.unit === targetUnitStr || a.unit === 'all') &&
                  (a.focus === targetFocus || a.focus === 'Both')
                );
                
                if (available.length === 0) {
                  available = repository.filter(a => 
                    block.allowedTypes.includes(a.category) && 
                    currentEffectiveCount >= a.min && currentEffectiveCount <= a.max && 
                    !usedCategoryIds[a.category].has(a.id) &&
                    (a.focus === targetFocus || a.focus === 'Both')
                  );
                }

                if (available.length === 0) {
                  available = repository.filter(a => 
                    block.allowedTypes.includes(a.category) && 
                    currentEffectiveCount >= a.min && currentEffectiveCount <= a.max &&
                    (a.focus === targetFocus || a.focus === 'Both')
                  );
                }

                if (available.length === 0) {
                  available = repository.filter(a => 
                    block.allowedTypes.includes(a.category) && 
                    currentEffectiveCount >= a.min && currentEffectiveCount <= a.max
                  );
                }

                if (available.length > 0) {
                  const picked = available[Math.floor(Math.random() * available.length)];
                  newPlans[program][`${day}-${block.id}`] = picked.id;
                  usedCategoryIds[picked.category].add(picked.id);
                } else {
                  newPlans[program][`${day}-${block.id}`] = ''; 
                }
              });
            });
        });

        setPlans(newPlans);
      };

      const openQuickAddModal = (prog, categoryPref) => {
        const targetFocus = prog === 'fun' ? 'Conversation' : 'Literacy';
        const rawCount = getStudentCount(activeDay, prog);
        const currentCount = rawCount === 0 ? 1 : rawCount;
        setNewAct({ 
          name: '', category: categoryPref, focus: targetFocus, min: 1, max: currentCount > 12 ? 12 : currentCount, 
          unit: selectedBook && selectedUnit ? `${selectedBook}-${selectedUnit}` : 'all', 
          materials: '', goal: '', description: '' 
        });
        setIsModalOpen(true);
      };

      const handleAddActivity = (e) => {
        e.preventDefault();
        if (!newAct.name) return;
        setRepository([...repository, { ...newAct, id: generateId() }]);
        setIsModalOpen(false);
        setNewAct({ name: '', category: 'Warm-up', focus: 'Both', min: 1, max: 12, unit: 'all', materials: '', goal: '', description: '' });
      };

      const removeActivity = (id) => {
        setRepository(repository.filter(a => a.id !== id));
      };

      // --- ROSTER HANDLERS ---
      const addStudentToRoster = () => {
        setRoster([...roster, { id: generateId(), name: '', schedule: { 'Monday': 'None', 'Tuesday': 'None', 'Wednesday': 'None', 'Thursday': 'None', 'Friday': 'None' } }]);
      };

      const updateStudentName = (id, newName) => {
        setRoster(roster.map(s => s.id === id ? { ...s, name: newName } : s));
      };

      const updateStudentSchedule = (id, day, newSchedule) => {
        setRoster(roster.map(s => s.id === id ? { ...s, schedule: { ...s.schedule, [day]: newSchedule } } : s));
      };

      const removeStudentFromRoster = (id) => {
        setRoster(roster.filter(s => s.id !== id));
      };

      const handleExportRoster = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(roster, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "abc_roster.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const handleImportRoster = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = JSON.parse(e.target.result);
            if (Array.isArray(parsed)) {
              setRoster(parsed);
            }
          } catch (err) {
            console.error("Invalid roster file", err);
          }
          event.target.value = null; // reset input
        };
        reader.readAsText(file);
      };

      // --- FILTER FOR REPOSITORY SEARCH ---
      const filteredRepository = useMemo(() => {
        if (!searchQuery) return repository;
        const lowerQ = searchQuery.toLowerCase();
        return repository.filter(act => 
          act.name.toLowerCase().includes(lowerQ) ||
          act.category.toLowerCase().includes(lowerQ) ||
          act.focus.toLowerCase().includes(lowerQ) ||
          (act.description && act.description.toLowerCase().includes(lowerQ)) ||
          (act.materials && act.materials.toLowerCase().includes(lowerQ)) ||
          (act.goal && act.goal.toLowerCase().includes(lowerQ))
        );
      }, [repository, searchQuery]);

      const exportToExcel = () => {
        const wb = XLSX.utils.book_new();

        ['fun', 'step'].forEach(program => {
            const currentBlocks = programConfig[program].blocks;
            const progTargets = targets[program];
            
            const planData = [];
            planData.push([`${programConfig[program].name} - Lesson Plan`]);
            
            if (progTargets.book && progTargets.unit) {
              planData.push(['Reference Material', `${progTargets.book} - ${progTargets.unit}`]);
            }
            
            planData.push(['Target Vocabulary', progTargets.vocab]);
            planData.push(['Target Sentences', progTargets.sentences]);
            planData.push(['Target Phonics', progTargets.phonics]);
            planData.push([]);
            
            const activeWeekDays = weekDays.filter(day => !isDayOff(day, program));
            if (activeWeekDays.length === 0) return; // Skip sheets with no active days
            
            planData.push(['Block Focus', ...activeWeekDays]);
            
            currentBlocks.forEach(block => {
              const row = [block.label];
              activeWeekDays.forEach(day => {
                 const actId = derivedPlan[program][`${day}-${block.id}`];
                 const activity = repository.find(a => a.id === actId);
                 
                 let cellText = activity ? activity.name : '';
                 if (activity && activity.description) {
                   cellText += `\n\n[Mechanics]\n${formatDescription(activity.description, progTargets)}`;
                 }
                 row.push(cellText);
              });
              planData.push(row);
            });

            // Retain the insights data for the second Excel sheet
            const insightsData = [];
            insightsData.push([`${programConfig[program].name} - Daily Insights`]);
            insightsData.push([]);
            
            activeWeekDays.forEach(day => {
              insightsData.push([`--- ${day} ---`]);
              const mats = [];
              const goals = [];
              currentBlocks.forEach(block => {
                const actId = derivedPlan[program][`${day}-${block.id}`];
                const act = repository.find(a => a.id === actId);
                if (act) {
                  if (act.materials && act.materials.trim() !== '' && act.materials.toLowerCase() !== 'none') {
                    mats.push(`${act.name}: ${formatDescription(act.materials.trim(), progTargets)}`);
                  }
                  if (act.goal && act.goal.trim() !== '') {
                    goals.push(`${act.name}: ${act.goal.trim()}`);
                  }
                }
              });
              insightsData.push(['Goals', goals.length > 0 ? goals.join('\n') : 'None']);
              insightsData.push(['Materials', mats.length > 0 ? mats.join('\n') : 'None']);
              insightsData.push([]);
            });

            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(planData), `${programConfig[program].name} Plan`);
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(insightsData), `${programConfig[program].name} Goals`);
        });

        if (wb.SheetNames.length > 0) {
            XLSX.writeFile(wb, `ABC_Weekly_Plan.xlsx`);
        } else {
            alert("No active classes to export.");
        }
      };

      const activeProgramsList = activeProgram === 'both' ? ['fun', 'step'] : [activeProgram];
      const currentTargets = activeProgram === 'both' ? targets.fun : targets[activeProgram];
      const targetFocus = activeProgram === 'fun' ? 'Conversation' : 'Literacy';

      // Helps us identify duplicate activities in the current plan for the dropdown warnings
      const currentPlanValues = activeProgramsList.flatMap(prog => 
        Object.values(derivedPlan[prog]).filter(val => val !== '')
      );
      const usedActivityIds = new Set(currentPlanValues);
      
      const printableDays = weekDays.filter(day => !holidays[day]); // Just filters manual holidays

      const TabButton = ({ id, icon: Icon, label }) => (
        <button
          onClick={() => setActiveTab(id)}
          className={`flex items-center gap-2 px-5 py-3 font-bold rounded-t-xl transition-all border-b-4 ${activeTab === id ? 'bg-white text-[#1E88E5] border-[#1E88E5] shadow-sm' : 'bg-[#f0ece1] text-gray-500 border-transparent hover:bg-[#e6e1d6]'}`}
        >
          <Icon className="w-5 h-5" /> {label}
        </button>
      );

      return (
        <div className="min-h-screen bg-[#FAF8F5] p-4 sm:p-8 font-sans print:bg-white print:p-0 relative">
          
          {/* Header */}
          <div className="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4 no-print">
            <div>
              <div className="flex items-center gap-3">
                <img 
                  src="abc-horizontal-block-tilted-mono.png" 
                  alt="ABC Garden Logo" 
                  className="h-12 w-auto object-contain"
                  onError={(e) => {
                    e.target.style.display = 'none';
                    e.target.nextSibling.style.display = 'block';
                  }}
                />
                <h1 className="text-3xl font-black hidden text-gray-800">ABC Garden</h1>
              </div>
              <p className="text-gray-500 font-bold ml-1 mt-1">Smart Lesson Planner</p>
            </div>
            <div className="flex gap-2">
            </div>
          </div>

          <div className="max-w-7xl mx-auto flex gap-2 border-b-4 border-gray-200 mb-6 no-print overflow-x-auto">
            <TabButton id="planner" icon={CalendarIcon} label="Weekly Planner" />
            <TabButton id="attendance" icon={ClipboardListIcon} label="Student Attendance" />
            <TabButton id="repository" icon={DatabaseIcon} label="Activity Repository" />
          </div>

          {activeTab === 'attendance' && (
            <div className="max-w-7xl mx-auto space-y-6">
              <div className="bg-[#f8fafc] border-l-4 border-blue-400 p-4 rounded-r-lg no-print">
                <p className="text-gray-800 text-sm">
                  <strong>Master Attendance Roster:</strong> The students and schedules you enter here will automatically update the "Daily Settings" student counts on your Weekly Planner. 
                  When you print your lesson plan, each day's specific roster will automatically print on the back!
                </p>
              </div>
              <div className="bg-white shadow-sm rounded-2xl border border-gray-200 overflow-hidden print:shadow-none print:border-none">
                 <div className="p-4 sm:p-6 border-b border-gray-200 bg-[#f8fafc] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 no-print">
                   <h2 className="text-xl font-bold text-gray-800">Student Roster & Weekly Schedule</h2>
                   <div className="flex flex-wrap items-center gap-2">
                      <label className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-[#1E88E5] border border-blue-200 rounded-md text-sm font-bold hover:bg-blue-50 transition-colors cursor-pointer shadow-sm">
                        <DownloadIcon className="w-4 h-4" />
                        Import
                        <input type="file" accept=".json" onChange={handleImportRoster} className="hidden" />
                      </label>
                      <button onClick={handleExportRoster} className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-[#1E88E5] border border-blue-200 rounded-md text-sm font-bold hover:bg-blue-50 transition-colors shadow-sm">
                        <UploadIcon className="w-4 h-4" />
                        Export
                      </button>
                      <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-[#1E88E5] text-white rounded-md text-sm font-bold hover:bg-blue-600 shadow-sm transition-colors ml-2">
                        <PrinterIcon className="w-4 h-4"/> Print Roster
                      </button>
                   </div>
                 </div>
                 
                 {/* Print Header for Master Roster */}
                 <div className="hidden print:block p-4 border-b-2 border-black">
                    <h1 className="text-2xl font-black text-black">Master Class Roster & Weekly Schedule</h1>
                 </div>

                 <div className="overflow-x-auto">
                   <table className="w-full text-left border-collapse">
                     <thead>
                       <tr className="bg-gray-50 print:bg-white">
                         <th className="p-4 print:p-2 border-b border-gray-200 print:border-black text-sm print:text-xs font-bold text-gray-700 print-text-black w-48">Student Name</th>
                         {weekDays.map(day => <th key={day} className="p-4 print:p-2 border-b border-gray-200 print:border-black text-sm print:text-xs font-bold text-gray-700 print-text-black text-center min-w-[120px] print:min-w-[60px]">{day}</th>)}
                         <th className="p-4 border-b border-gray-200 text-sm font-bold text-gray-700 w-16 text-center no-print">Actions</th>
                       </tr>
                     </thead>
                     <tbody>
                       {roster.map(student => (
                          <tr key={student.id} className="border-b border-gray-100 print:border-black hover:bg-[#f8fafc] transition-colors">
                             <td className="p-2 print:p-2 print:border-r print:border-black">
                               <input type="text" value={student.name} onChange={e => updateStudentName(student.id, e.target.value)} placeholder="Student Name" className="w-full p-2.5 print:p-1 border border-gray-300 print:border-none rounded outline-none focus:ring-2 focus:ring-[#1E88E5] font-medium print-text-black" />
                             </td>
                             {weekDays.map(day => (
                               <td key={day} className="p-2 print:p-2 text-center print:border-r print:border-black">
                                 <select value={student.schedule[day]} onChange={e => updateStudentSchedule(student.id, day, e.target.value)} className={`w-full p-2.5 print:p-1 border print:border-none rounded text-sm outline-none focus:ring-2 focus:ring-[#1E88E5] font-bold transition-colors print-text-black ${student.schedule[day] === 'None' ? 'bg-gray-50 border-gray-200 text-gray-400' : 'bg-white border-blue-300 text-[#1E88E5] shadow-sm'}`}>
                                   <option value="None">- Off -</option>
                                   <option value="fun">Fun English</option>
                                   <option value="step">Step English</option>
                                   <option value="Both">Both Classes</option>
                                 </select>
                               </td>
                             ))}
                             <td className="p-2 text-center no-print">
                               <button onClick={() => removeStudentFromRoster(student.id)} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Delete Student">
                                 <Trash2Icon className="w-5 h-5 mx-auto"/>
                               </button>
                             </td>
                          </tr>
                       ))}
                     </tbody>
                   </table>
                   {roster.length === 0 && <div className="p-12 text-center text-gray-500 font-medium">No students added to the roster yet.</div>}
                 </div>
                 <div className="p-4 border-t border-gray-200 bg-white no-print">
                   <button onClick={addStudentToRoster} className="flex items-center gap-2 text-sm text-[#1E88E5] hover:text-blue-700 font-medium px-2 py-1 rounded-md hover:bg-blue-50 transition-colors">
                     <UserPlusIcon className="w-4 h-4" />
                     生徒を追加 (Add Student Row)
                   </button>
                 </div>
              </div>
            </div>
          )}

          {activeTab === 'planner' && (
            <>
              {/* ======================= */}
              {/* SCREEN VIEW (EDITING)   */}
              {/* ======================= */}
              <div className="block print:hidden space-y-6 max-w-7xl mx-auto">
                
                {/* Header & Calendar Setup */}
                <div className="bg-white shadow-sm border border-gray-200 rounded-2xl overflow-hidden">
                  
                  {/* Program Toggle */}
                  <div className="p-4 border-b border-gray-200 bg-gray-50 flex justify-center">
                    <div className="flex bg-[#f0ece1] p-1.5 rounded-xl shadow-inner w-full max-w-lg">
                      <button onClick={() => setActiveProgram('both')} className={`flex-1 px-4 py-2.5 rounded-lg text-sm font-bold transition-colors ${activeProgram === 'both' ? 'bg-white text-[#1E88E5] shadow-sm' : 'text-gray-500 hover:text-gray-800'}`}>Both</button>
                      <button onClick={() => setActiveProgram('fun')} className={`flex-1 px-4 py-2.5 rounded-lg text-sm font-bold transition-colors ${activeProgram === 'fun' ? 'bg-white text-[#1E88E5] shadow-sm' : 'text-gray-500 hover:text-gray-800'}`}>Fun English</button>
                      <button onClick={() => setActiveProgram('step')} className={`flex-1 px-4 py-2.5 rounded-lg text-sm font-bold transition-colors ${activeProgram === 'step' ? 'bg-white text-[#1E88E5] shadow-sm' : 'text-gray-500 hover:text-gray-800'}`}>Step English</button>
                    </div>
                  </div>

                  {/* Calendar Setup & Quick Gen */}
                  <div className="bg-[#f8fafc] p-4 sm:p-6 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                    
                    <div className="flex flex-col sm:flex-row gap-6 w-full md:w-auto">
                      {/* Schedule Column */}
                      <div className="flex flex-col gap-2">
                        <div className="flex items-center gap-2 text-[#1E88E5] font-bold whitespace-nowrap">
                          <CalendarIcon className="w-5 h-5" /> Schedule:
                        </div>
                        <div className="flex items-center gap-2 bg-white px-3 py-2 rounded-lg border border-gray-200 shadow-sm h-11">
                          <select value={calYear} onChange={e => setCalYear(Number(e.target.value))} className="font-bold text-gray-800 outline-none bg-transparent cursor-pointer">
                            <option value={currentYear}>{currentYear}</option>
                            <option value={currentYear + 1}>{currentYear + 1}</option>
                          </select>
                          <span className="text-gray-300">/</span>
                          <select value={calMonth} onChange={e => setCalMonth(Number(e.target.value))} className="font-bold text-gray-800 outline-none bg-transparent cursor-pointer">
                            {monthNames.map((m, i) => <option key={i} value={i}>{m}</option>)}
                          </select>
                          <span className="text-gray-300">/</span>
                          <select value={calWeek} onChange={e => setCalWeek(Number(e.target.value))} className="font-bold text-gray-800 outline-none bg-transparent text-sm cursor-pointer max-w-[130px] truncate">
                            {weeks.map((w, i) => <option key={i} value={i}>Wk {i+1}: {w.label}</option>)}
                          </select>
                        </div>
                      </div>

                      {/* Lesson Gen Column */}
                      <div className="flex flex-col gap-2">
                        <div className="flex items-center gap-2 text-[#1E88E5] font-bold whitespace-nowrap">
                          <ZapIcon className="w-5 h-5 text-[#1E88E5]"/> Lesson Gen:
                        </div>
                        <div className="flex items-center gap-2 bg-white px-3 py-2 rounded-lg border border-gray-200 shadow-sm h-11">
                          <BookIcon className="w-5 h-5 text-gray-400 shrink-0" />
                          <select value={selectedBook} onChange={handleBookChange} className="font-bold text-gray-800 outline-none bg-transparent text-sm cursor-pointer truncate max-w-[140px]">
                            {Object.entries(curriculumSets).map(([key, data]) => (
                              <option key={key} value={key}>{data.name}</option>
                            ))}
                          </select>
                          <select value={selectedUnit} onChange={(e) => setSelectedUnit(e.target.value)} className="font-bold text-gray-800 outline-none bg-transparent text-sm cursor-pointer">
                            {curriculumSets[selectedBook].units.map(u => (
                              <option key={u.id} value={u.id}>{selectedBook === 'lb1' ? `Lesson ${u.id}` : `Unit ${u.id}`}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    </div>

                    {/* Buttons Row */}
                    <div className="flex flex-row gap-2 w-full md:w-auto shrink-0">
                      <button onClick={generateSet} className="flex-1 md:flex-none flex items-center justify-center px-6 py-0 bg-[#1E88E5] text-white rounded-lg hover:bg-blue-600 transition-colors shadow-sm text-sm font-bold h-11">
                        Fill Targets
                      </button>
                      <button onClick={() => randomizeWeek()} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-0 bg-indigo-50 text-[#1E88E5] border border-blue-200 rounded-lg hover:bg-blue-50 transition-colors shadow-sm text-sm font-bold h-11" title="Shuffle week without changing targets">
                        <ShuffleIcon className="w-4 h-4 shrink-0" /> Randomize
                      </button>
                    </div>

                  </div>

                  {/* Daily Schedule & Students Bar */}
                  <div className="flex flex-col lg:flex-row items-start lg:items-center gap-4 px-6 py-5 border-b border-gray-200 bg-white">
                     <div className="text-sm font-bold text-gray-800 flex items-center gap-2 whitespace-nowrap mr-2 shrink-0">
                       <CalendarIcon className="w-5 h-5 text-gray-500" /> Settings:
                     </div>
                     <div className="flex gap-4 overflow-x-auto w-full pb-2 lg:pb-0 scrollbar-hide">
                       {weekDays.map(day => {
                         const rawCount = getStudentCount(day, activeProgram);
                         const dayOff = isDayOff(day, activeProgram);
                         
                         return (
                           <div key={day} className={`flex flex-col gap-2 p-3 rounded-xl border min-w-[260px] flex-1 shrink-0 transition-colors ${dayOff ? 'bg-gray-50 border-gray-200' : 'bg-[#f8fafc] border-blue-200 shadow-sm'}`}>
                             <div className="flex justify-between items-center gap-2">
                               <span className={`text-sm font-bold whitespace-nowrap ${dayOff ? 'text-gray-400' : 'text-gray-800'}`}>
                                 {day} <span className="text-xs font-medium ml-0.5">({displayShortDate(currentWeekDates[day])})</span>
                               </span>
                               <label className="flex items-center gap-1 cursor-pointer shrink-0">
                                 <input 
                                   type="checkbox" 
                                   checked={holidays[day]} 
                                   onChange={(e) => setHolidays(prev => ({...prev, [day]: e.target.checked}))} 
                                   className="w-3.5 h-3.5 text-red-500 rounded cursor-pointer" 
                                   title="Mark as Holiday"
                                 />
                                 <span className="text-[10px] text-gray-500 font-bold uppercase">Off</span>
                               </label>
                             </div>
                             {!dayOff ? (
                               <div className="flex items-center justify-between bg-white px-2 py-1.5 rounded-lg border border-gray-200">
                                 <div className="flex items-center gap-1 text-gray-500">
                                   <UsersIcon className="w-3.5 h-3.5" />
                                   <span className="text-[10px] font-bold uppercase">Students</span>
                                 </div>
                                 <span className="text-sm font-black text-[#1E88E5] pr-1">{rawCount}</span>
                               </div>
                             ) : (
                                <div className="flex items-center justify-center bg-gray-100 px-2 py-1.5 rounded-lg border border-gray-200 text-[11px] font-bold text-gray-400 h-[34px]">
                                  No Class
                                </div>
                             )}
                           </div>
                         );
                       })}
                     </div>
                  </div>

                  {/* Targets */}
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-6">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Target Vocabulary</label>
                      <input type="text" value={currentTargets.vocab} onChange={(e) => updateTarget('vocab', e.target.value)} placeholder="e.g. red, blue, green" className="w-full p-2 border border-gray-300 rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Target Sentences</label>
                      <input type="text" value={currentTargets.sentences} onChange={(e) => updateTarget('sentences', e.target.value)} placeholder="e.g. What color is it?" className="w-full p-2 border border-gray-300 rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Target Phonics</label>
                      <input type="text" value={currentTargets.phonics} onChange={(e) => updateTarget('phonics', e.target.value)} placeholder="e.g. Aa, Bb, Cc" className="w-full p-2 border border-gray-300 rounded outline-none" />
                    </div>
                  </div>
                </div>

                {/* Daily Editor */}
                <div className="bg-white shadow-sm rounded-2xl border border-gray-200 overflow-hidden">
                  <div className="flex border-b border-gray-200 bg-gray-50">
                    {weekDays.map(day => {
                      const dayOff = isDayOff(day, activeProgram);
                      return (
                        <button
                          key={day}
                          onClick={() => setActiveDay(day)}
                          className={`flex-1 py-4 flex flex-col items-center justify-center transition-colors border-b-4 ${
                            activeDay === day
                              ? 'bg-white text-[#1E88E5] border-[#1E88E5]'
                              : dayOff 
                                ? 'text-gray-400 hover:bg-gray-100 border-transparent'
                                : 'text-gray-500 hover:text-gray-800 hover:bg-gray-100 border-transparent'
                          }`}
                        >
                          <span className="font-black text-sm sm:text-base">{day}</span>
                          <span className={`text-[10px] font-bold ${activeDay === day ? 'text-blue-400' : 'text-gray-400'}`}>
                             {dayOff ? '(No Class)' : displayShortDate(currentWeekDates[day])}
                          </span>
                        </button>
                      );
                    })}
                  </div>

                  <div className="bg-white min-h-[300px]">
                    <div className="p-4 sm:p-6 space-y-4">
                      <div className="flex justify-between items-center border-b border-gray-100 pb-4 mb-4">
                        <h2 className="font-black text-xl text-gray-800 flex items-center gap-2">
                          {activeDay} <span className="text-gray-400 text-lg font-medium">({displayShortDate(currentWeekDates[activeDay])})</span>
                        </h2>
                        <div className="flex gap-2">
                          <button onClick={exportToExcel} className="flex items-center gap-2 px-3 py-1.5 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 text-sm transition-colors"><DownloadIcon className="w-4 h-4"/> Export Excel</button>
                          <button onClick={() => window.print()} className="flex items-center gap-2 px-3 py-1.5 bg-[#1E88E5] text-white font-bold rounded-lg hover:bg-blue-600 text-sm transition-colors"><PrinterIcon className="w-4 h-4"/> Print Dual Weekly Plan</button>
                        </div>
                      </div>

                      {isDayOff(activeDay, activeProgram) ? (
                        <div className="flex flex-col items-center justify-center p-12 text-center border-2 border-dashed border-gray-200 rounded-xl bg-gray-50">
                          <PalmtreeIcon className="w-12 h-12 text-gray-300 mb-3" />
                          <h3 className="text-xl font-bold text-gray-500">No Class</h3>
                          <p className="text-gray-400 mt-2 font-medium">No lessons scheduled for {activeProgram === 'both' ? 'either program' : 'this program'} today.</p>
                          <p className="text-xs text-gray-400 mt-1">To enable scheduling, add students to the roster or uncheck the holiday toggle.</p>
                        </div>
                      ) : (
                        activeProgramsList.map((prog) => {
                          if (isDayOff(activeDay, prog)) return null; 
                          
                          const progConfig = programConfig[prog].blocks;
                          const progTargets = targets[prog];
                          const progFocus = prog === 'fun' ? 'Conversation' : 'Literacy';
                          const rawCount = getStudentCount(activeDay, prog);
                          const currentEffectiveCount = rawCount <= 1 ? 2 : rawCount;

                          return (
                            <div key={prog} className="mb-10 last:mb-0">
                               {activeProgram === 'both' && (
                                 <h3 className="font-black text-xl text-gray-800 mb-4 border-b-2 border-gray-100 pb-2">{programConfig[prog].name}</h3>
                               )}
                               
                               <div className="space-y-4">
                                 {progConfig.map(block => {
                                   const validOptions = repository.filter(a => 
                                     block.allowedTypes.includes(a.category) && 
                                     currentEffectiveCount >= a.min && currentEffectiveCount <= a.max &&
                                     (a.focus === progFocus || a.focus === 'Both')
                                   );
                                   
                                   const isMissing = validOptions.length === 0;
                                   const isSingle = validOptions.length === 1;
                                   const selectedActId = derivedPlan[prog][`${activeDay}-${block.id}`];
                                   const selectedAct = repository.find(a => a.id === selectedActId);

                                   return (
                                     <div key={block.id} className="bg-gray-50 border border-gray-200 rounded-xl p-4 flex flex-col md:flex-row gap-4 items-start">
                                       <div className="w-full md:w-1/3">
                                         <h3 className="font-bold text-gray-800 text-lg">{block.label}</h3>
                                         <div className="flex flex-wrap gap-1 mt-2">
                                           {block.allowedTypes.map(type => (
                                             <span key={type} className="text-[10px] uppercase font-bold bg-[#f8fafc] text-[#1E88E5] border border-blue-100 px-2 py-0.5 rounded">{type}</span>
                                           ))}
                                         </div>
                                       </div>
                                       
                                       <div className="w-full md:w-2/3 flex flex-col gap-3">
                                         <select
                                           value={selectedActId || ''}
                                           onChange={(e) => updatePlan(prog, activeDay, block.id, e.target.value)}
                                           disabled={isSingle}
                                           className={`w-full p-3 rounded-lg border text-sm font-bold outline-none shadow-sm transition-all
                                             ${isMissing ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-gray-200 focus:ring-2 focus:ring-[#1E88E5]'}
                                             ${isSingle ? 'opacity-100 bg-gray-100 border-gray-300 text-gray-800 cursor-not-allowed' : 'text-gray-900'}
                                           `}
                                         >
                                           <option value="">-- Select Activity --</option>
                                           {validOptions.map(act => {
                                             const isUsedElsewhere = usedActivityIds.has(act.id) && selectedActId !== act.id;
                                             return (
                                               <option key={act.id} value={act.id}>
                                                 {act.name} {isUsedElsewhere ? '(Used this week)' : ''}
                                               </option>
                                             );
                                           })}
                                         </select>

                                         {/* Inline Goals, Materials, and Description */}
                                         {selectedAct && (
                                           <div className="flex flex-col gap-1.5 mt-1">
                                             <div className="flex gap-1.5">
                                               <div className="flex-1 bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex flex-col gap-1 justify-start">
                                                 <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Goal</div>
                                                 <div className="text-sm text-gray-800 font-medium leading-snug">{selectedAct.goal || 'None'}</div>
                                               </div>
                                               <div className="flex-1 bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex flex-col gap-1 justify-start">
                                                 <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Materials</div>
                                                 <div className="text-sm text-gray-800 font-medium leading-snug">
                                                   {selectedAct.materials ? formatDescription(selectedAct.materials, progTargets) : 'None'}
                                                 </div>
                                               </div>
                                             </div>
                                             {selectedAct.description && (
                                               <div className="w-full bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex flex-col gap-1 justify-start">
                                                 <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Description / Mechanics</div>
                                                 <div className="text-sm text-gray-800 font-medium leading-snug">
                                                   {formatDescription(selectedAct.description, progTargets)}
                                                 </div>
                                                 {rawCount <= 1 && selectedAct.min >= 2 && (
                                                   <div className="text-xs text-orange-600 font-bold mt-1">
                                                     * Designed for 2+ students (Teacher acts as a student)
                                                   </div>
                                                 )}
                                               </div>
                                             )}
                                           </div>
                                         )}

                                         {isMissing && (
                                           <button onClick={() => openQuickAddModal(prog, block.allowedTypes[0])} className="w-full flex items-center justify-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                                             <PlusCircleIcon className="w-4 h-4" /> Quick Add Missing Activity
                                           </button>
                                         )}
                                       </div>
                                     </div>
                                   );
                                 })}
                               </div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                </div>
              </div>

              {/* ======================= */}
              {/* DUAL PRINT VIEW (1 DAY/PAGE) */}
              {/* ======================= */}
              <div className="hidden print:block w-full">
                {printableDays.length === 0 && (
                  <div className="print-text-black p-10 text-center text-xl font-bold">
                    All days are marked as Holiday. Nothing to print.
                  </div>
                )}
                
                {printableDays.map((day, dayIndex) => {
                  const activeProgs = ['fun', 'step'].filter(p => !isDayOff(day, p));
                  return activeProgs.map((prog, progIndex) => {
                    const isLastOverall = dayIndex === printableDays.length - 1 && progIndex === activeProgs.length - 1;
                    
                    const printConfig = programConfig[prog].blocks;
                    const printTargets = targets[prog];
                    const printPlan = derivedPlan[prog];
                    
                    return (
                      <React.Fragment key={`print-${day}-${prog}`}>
                        {/* --- LESSON PLAN PAGE --- */}
                        <div className={`w-full print:h-[277mm] print:flex print:flex-col print:overflow-hidden print-break-after`}>
                          {/* Header */}
                          <div className="border-2 border-gray-500 print-border-2 rounded-xl mb-4 print:mb-1 bg-white overflow-hidden print-avoid-break shrink-0">
                            <div className="p-5 print:p-1.5 border-b-2 border-gray-500 print-border-b-2 flex justify-between items-center bg-white">
                              <div>
                                <h1 className="text-3xl print:text-sm font-black text-gray-800 print-text-black flex items-center">
                                  {day}, {formatDateForHeader(currentWeekDates[day])} <span className="text-xl print:text-[10px] font-bold text-gray-500 mx-2">|</span> {programConfig[prog].name}
                                </h1>
                                <div className="flex items-center gap-3 print:gap-1 mt-2 print:mt-0.5">
                                  <p className="text-lg print:text-[9px] text-gray-600 font-bold print-text-black">{programConfig[prog].duration}</p>
                                  {printTargets.book && printTargets.unit && (
                                    <>
                                      <span className="text-gray-400 print:text-gray-500 font-bold print-text-black">|</span>
                                      <p className="text-xl print:text-[9px] text-gray-800 print-text-black font-black">
                                        {printTargets.book} : {printTargets.unit}
                                      </p>
                                    </>
                                  )}
                                </div>
                              </div>
                            </div>
                            
                            <div className="grid grid-cols-3 gap-6 print:gap-1.5 bg-gray-50 print-bg-gray p-5 print:p-1.5 border-b-2 border-gray-500 print-border-b-2">
                              <div>
                                <label className="block text-sm print:text-[8px] font-bold text-gray-500 uppercase tracking-wider mb-2 print:mb-0.5 print-text-black">Target Vocabulary</label>
                                <div className="text-lg print:text-[10px] font-bold print-text-black break-words leading-snug">{printTargets.vocab || '\u00A0'}</div>
                              </div>
                              <div>
                                <label className="block text-sm print:text-[8px] font-bold text-gray-500 uppercase tracking-wider mb-2 print:mb-0.5 print-text-black">Target Sentences</label>
                                <div className="text-lg print:text-[10px] font-bold print-text-black break-words leading-snug">{printTargets.sentences || '\u00A0'}</div>
                              </div>
                              <div>
                                <label className="block text-sm print:text-[8px] font-bold text-gray-500 uppercase tracking-wider mb-2 print:mb-0.5 print-text-black">Target Phonics</label>
                                <div className="text-lg print:text-[10px] font-bold print-text-black break-words leading-snug">{printTargets.phonics || '\u00A0'}</div>
                              </div>
                            </div>
                          </div>

                          {/* Daily Blocks Table */}
                          <div className="border-2 border-gray-500 print-border-2 rounded-xl overflow-hidden bg-white flex-1 flex flex-col">
                            <table className="w-full text-left border-collapse h-full">
                              <thead>
                                <tr>
                                  <th className="p-4 print:p-1 border-b-2 border-r-2 border-gray-500 print-border-b-2 print-border-r-2 font-black text-lg print:text-[9px] text-gray-800 bg-gray-100 print-bg-gray w-1/4">Block Focus</th>
                                  <th className="p-4 print:p-1 border-b-2 border-gray-500 print-border-b-2 font-black text-lg print:text-[9px] text-gray-800 bg-gray-100 print-bg-gray">Activity & Mechanics</th>
                                </tr>
                              </thead>
                              <tbody>
                                {printConfig.map((block, index) => {
                                  const rawCount = getStudentCount(day, prog);
                                  const selectedActId = printPlan[`${day}-${block.id}`];
                                  const selectedAct = repository.find(a => a.id === selectedActId);
                                  const isLast = index === printConfig.length - 1;

                                  return (
                                    <tr key={block.id} className="print-avoid-break">
                                      <td className={`p-4 print:p-1.5 border-r-2 border-gray-500 print-border-r-2 bg-gray-50 print-bg-gray text-base print:text-[10px] font-bold text-gray-800 print-text-black align-top ${!isLast ? 'border-b-2 print-border-b-2' : ''}`}>
                                        {block.label}
                                      </td>
                                      <td className={`p-4 print:p-1.5 align-top bg-white ${!isLast ? 'border-b-2 border-gray-500 print-border-b-2' : ''}`}>
                                        
                                        <div className="font-black text-xl print:text-[11px] text-black break-words mb-2 print:mb-1">
                                          {selectedAct ? (
                                            <>
                                              {selectedAct.name}
                                              {rawCount <= 1 && selectedAct.min >= 2 && (
                                                <span className="text-sm print:text-[8px] text-gray-600 print-text-black font-bold ml-2 print:ml-1">
                                                  (Teacher acts as a student)
                                                </span>
                                              )}
                                            </>
                                          ) : 'No activity selected'}
                                        </div>
                                        
                                        {/* Inline Goals, Materials, and Description */}
                                        {selectedAct && (
                                          <div className="flex flex-col gap-1.5 print:gap-1 mt-1 print:mt-1">
                                            <div className="flex gap-1.5 print:gap-1">
                                              <div className="flex-1 bg-white print:bg-white p-2 print:p-1 rounded border border-gray-300 print-border-1 flex flex-col gap-1 print:gap-[2px] justify-start">
                                                <div className="text-xs print:text-[7px] font-bold text-gray-500 print-text-black uppercase tracking-wider">Goal</div>
                                                <div className="text-sm print:text-[8px] text-gray-800 print-text-black font-medium leading-snug">{selectedAct.goal || 'None'}</div>
                                              </div>
                                              <div className="flex-1 bg-white print:bg-white p-2 print:p-1 rounded border border-gray-300 print-border-1 flex flex-col gap-1 print:gap-[2px] justify-start">
                                                <div className="text-xs print:text-[7px] font-bold text-gray-500 print-text-black uppercase tracking-wider">Materials</div>
                                                <div className="text-sm print:text-[8px] text-gray-800 print-text-black font-medium leading-snug">
                                                  {selectedAct.materials ? formatDescription(selectedAct.materials, printTargets) : 'None'}
                                                </div>
                                              </div>
                                            </div>
                                            {selectedAct.description && (
                                              <div className="bg-white print:bg-white p-2 print:p-1 rounded border border-gray-300 print-border-1 flex flex-col gap-1 print:gap-[2px] justify-start">
                                                <div className="text-xs print:text-[7px] font-bold text-gray-500 print-text-black uppercase tracking-wider">Description / Mechanics</div>
                                                <div className="text-base print:text-[8.5px] text-gray-800 print-text-black font-medium leading-snug whitespace-normal break-words">
                                                  {formatDescription(selectedAct.description, printTargets)}
                                                </div>
                                              </div>
                                            )}
                                          </div>
                                        )}
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>

                        {/* --- ROSTER PAGE (Prints on the back) --- */}
                        <div className={`w-full flex flex-col gap-6 print:gap-4 print:min-h-[260mm] mt-12 print:mt-0 ${!isLastOverall ? 'print-break-after' : ''}`}>
                           <div className="border-2 border-gray-500 print-border-2 rounded-xl bg-white overflow-hidden print-avoid-break shrink-0">
                              <div className="p-5 print:p-2 border-b-2 border-gray-500 print-border-b-2 flex justify-between items-center bg-gray-50 print-bg-gray">
                                 <h1 className="text-3xl print:text-sm font-black text-gray-800 print-text-black flex items-center">
                                   {day} Roster <span className="text-xl print:text-[10px] font-bold text-gray-500 mx-2">|</span> {programConfig[prog]?.name || programsInfo[prog].name}
                                 </h1>
                                 <h2 className="text-xl print:text-[10px] font-bold text-gray-600 print-text-black">{formatDateForHeader(currentWeekDates[day])}</h2>
                              </div>
                              <table className="w-full text-left border-collapse">
                                 <thead>
                                    <tr>
                                       <th className="p-4 print:p-1 border-b-2 border-r-2 border-gray-500 print-border-b-2 print-border-r-2 font-black text-lg print:text-[10px] text-gray-800 bg-gray-100 print-bg-gray w-5/6">Student Name</th>
                                       <th className="p-4 print:p-1 border-b-2 border-gray-500 print-border-b-2 font-black text-lg print:text-[10px] text-gray-800 bg-gray-100 print-bg-gray w-1/6 text-center">Attendance</th>
                                    </tr>
                                 </thead>
                                 <tbody>
                                    {roster.filter(s => s.schedule[day] === prog || s.schedule[day] === 'Both').map((student, i, arr) => (
                                       <tr key={student.id} className="print-avoid-break">
                                          <td className={`p-4 print:p-1.5 border-r-2 border-gray-500 print-border-r-2 text-xl print:text-[11px] font-bold text-gray-800 print-text-black ${i !== arr.length - 1 ? 'border-b-2 print-border-b-2' : ''}`}>
                                            {student.name || `Student ${i + 1}`}
                                          </td>
                                          <td className={`p-4 print:p-1.5 ${i !== arr.length - 1 ? 'border-b-2 print-border-b-2' : ''}`}>
                                             <div className="w-6 h-6 print:w-4 print:h-4 border-2 border-gray-400 print-border-2 mx-auto rounded-sm"></div>
                                          </td>
                                       </tr>
                                    ))}
                                    {roster.filter(s => s.schedule[day] === prog || s.schedule[day] === 'Both').length === 0 && (
                                       <tr>
                                          <td colSpan="2" className="p-8 print:p-2 text-center text-gray-500 font-bold text-xl print:text-[11px] print-text-black">No students scheduled for today.</td>
                                       </tr>
                                    )}
                                 </tbody>
                              </table>
                           </div>

                           {/* Notes Section (Giant White Space) */}
                           <div className="border-2 border-gray-500 print-border-2 rounded-xl bg-white overflow-hidden flex-1 flex flex-col min-h-[200px] print:min-h-0">
                              <div className="p-5 print:p-2 border-b-2 border-gray-500 print-border-b-2 flex items-center bg-gray-50 print-bg-gray shrink-0">
                                 <h2 className="text-2xl print:text-sm font-black text-gray-800 print-text-black">
                                   Notes
                                 </h2>
                              </div>
                              <div className="flex-1 w-full bg-white print:bg-white"></div>
                           </div>
                        </div>
                      </React.Fragment>
                    );
                  });
                })}
              </div>

            </>
          )}

          {/* REPOSITORY TAB */}
          {activeTab === 'repository' && (
            <div className="max-w-7xl mx-auto flex flex-col gap-6 no-print">
              <div className="bg-white shadow-sm rounded-2xl border border-gray-200 p-6">
                <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                  <DatabaseIcon className="w-5 h-5 text-[#1E88E5]"/> Add Activity to Database
                </h2>
                <form onSubmit={handleAddActivity} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4 items-start">
                  <div className="lg:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Name</label>
                    <input required type="text" value={newAct.name} onChange={e => setNewAct({...newAct, name: e.target.value})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none" />
                  </div>
                  <div className="lg:col-span-1">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Category</label>
                    <select value={newAct.category} onChange={e => setNewAct({...newAct, category: e.target.value})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none">
                      {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                    </select>
                  </div>
                  <div className="lg:col-span-1">
                    <label className="block text-[10px] font-bold text-gray-600 mb-1 leading-tight">Focus</label>
                    <select value={newAct.focus} onChange={e => setNewAct({...newAct, focus: e.target.value})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none">
                      <option value="Both">Both</option>
                      <option value="Conversation">Conversation</option>
                      <option value="Literacy">Literacy</option>
                    </select>
                  </div>
                  <div className="lg:col-span-1 grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[10px] font-bold text-gray-600 mb-1 leading-tight">Min. Students</label>
                      <input type="number" min="1" max="12" value={newAct.min} onChange={e => setNewAct({...newAct, min: Number(e.target.value)})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-gray-600 mb-1 leading-tight">Max. Students</label>
                      <input type="number" min="1" max="12" value={newAct.max} onChange={e => setNewAct({...newAct, max: Number(e.target.value)})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none" />
                    </div>
                  </div>
                  <div className="lg:col-span-1">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Unit Tag</label>
                    <input type="text" value={newAct.unit} onChange={e => setNewAct({...newAct, unit: e.target.value})} placeholder="e.g. all, lb1-1" className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none" />
                  </div>
                  <div className="lg:col-span-6 border-t border-gray-100 pt-4"></div>
                  <div className="lg:col-span-2">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Materials</label>
                    <input type="text" value={newAct.materials} onChange={e => setNewAct({...newAct, materials: e.target.value})} placeholder="(Leave blank for None)" className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none" />
                  </div>
                  <div className="lg:col-span-4">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Goal</label>
                    <input type="text" value={newAct.goal} onChange={e => setNewAct({...newAct, goal: e.target.value})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 focus:ring-2 focus:ring-[#1E88E5] outline-none" />
                  </div>
                  <div className="lg:col-span-6">
                    <label className="block text-xs font-bold text-gray-600 mb-1">Description / Mechanics</label>
                    <textarea rows="2" value={newAct.description} onChange={e => setNewAct({...newAct, description: e.target.value})} className="w-full p-2 border border-gray-200 rounded-md text-sm bg-gray-50 resize-y focus:ring-2 focus:ring-[#1E88E5] outline-none" placeholder="Brief instructions for the teacher..."></textarea>
                  </div>
                  
                  <div className="lg:col-span-6 flex justify-end">
                    <button type="submit" className="px-6 py-2 bg-[#1E88E5] text-white rounded-md text-sm font-bold hover:bg-blue-600 transition-colors shadow-sm">Add to Repository</button>
                  </div>
                </form>
              </div>

              <div className="bg-white shadow-sm rounded-2xl border border-gray-200 overflow-hidden">
                <div className="bg-gray-50 border-b border-gray-200 p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <h3 className="font-bold text-gray-800 text-lg">Saved Activities ({filteredRepository.length})</h3>
                  <div className="relative w-full sm:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <SearchIcon className="w-4 h-4 text-gray-400" />
                    </div>
                    <input 
                      type="text" 
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      placeholder="Search repository..." 
                      className="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#1E88E5] bg-white text-gray-900"
                    />
                  </div>
                </div>
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-white border-b border-gray-200">
                      <th className="p-4 text-xs font-bold text-gray-500 tracking-wider">Name / Mechanics</th>
                      <th className="p-4 text-xs font-bold text-gray-500 tracking-wider">Category</th>
                      <th className="p-4 text-xs font-bold text-gray-500 tracking-wider">Capacity</th>
                      <th className="p-4 text-xs font-bold text-gray-500 tracking-wider">Materials</th>
                      <th className="p-4 text-xs font-bold text-gray-500 tracking-wider">Goal</th>
                      <th className="p-4 text-xs font-bold text-gray-500 tracking-wider text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredRepository.length > 0 ? (
                      filteredRepository.map(act => (
                        <tr key={act.id} className="hover:bg-gray-50 border-b border-gray-100 transition-colors">
                          <td className="p-4">
                            <div className="text-sm font-bold text-gray-800">{act.name}</div>
                            <div className="text-[11px] text-gray-500 mt-1 line-clamp-2" title={act.description}>{act.description || '-'}</div>
                          </td>
                          <td className="p-4">
                            <div className="flex flex-col gap-1 items-start">
                              <span className="bg-[#f8fafc] text-[#1E88E5] border border-blue-100 px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap">{act.category}</span>
                              <span className={`px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap border
                                ${act.focus === 'Conversation' ? 'bg-green-50 text-green-700 border-green-200' : 
                                  act.focus === 'Literacy' ? 'bg-purple-50 text-purple-700 border-purple-200' : 
                                  'bg-gray-50 text-gray-600 border-gray-200'}`}>
                                {act.focus}
                              </span>
                            </div>
                          </td>
                          <td className="p-4 text-sm text-gray-600 font-medium whitespace-nowrap">{act.min} - {act.max} students</td>
                          <td className="p-4 text-sm text-gray-600">{act.materials || '-'}</td>
                          <td className="p-4 text-sm text-gray-600">{act.goal || '-'}</td>
                          <td className="p-4 text-center">
                             <button onClick={() => removeActivity(act.id)} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Delete Activity">
                               <Trash2Icon className="w-5 h-5 mx-auto" />
                             </button>
                          </td>
                        </tr>
                      ))
                    ) : (
                      <tr>
                        <td colSpan="6" className="p-12 text-center text-gray-500 font-bold bg-white">
                          No activities found matching "{searchQuery}"
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
