<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Garden 出席表</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM for logic -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* Print-specific styles */
    @media print {
      @page { size: landscape; margin: 15mm; }
      body { background: white; }
      .no-print { display: none !important; }
      .print-border { border: 1px solid #cbd5e1 !important; }
      .print-text-black { color: black !important; }
      .print-bg-gray { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- React App Target -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Helper for generating IDs safely without relying on a build step
    const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

    // --- ICON COMPONENTS (Replaced lucide-react with inline SVGs for the standalone file) ---
    const CalendarIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>;
    const ClipboardCheckIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>;
    const PrinterIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>;
    const UserPlusIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;
    const Trash2Icon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const DownloadIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

    // --- MAIN APP COMPONENT ---
    const App = () => {
      // --- STATE ---
      const [activeMainTab, setActiveMainTab] = useState('attendance');
      const [activeProgram, setActiveProgram] = useState('fun');
      const [activeOutsideProgram, setActiveOutsideProgram] = useState('intl');

      // Initializing default rows
      const [students, setStudents] = useState({
        fun: Array.from({ length: 5 }, () => ({ id: generateId(), name: '' })),
        step: Array.from({ length: 5 }, () => ({ id: generateId(), name: '' })),
        intl: Array.from({ length: 12 }, () => ({ id: generateId(), name: '' })),
        after: Array.from({ length: 6 }, () => ({ id: generateId(), name: '' }))
      });

      const [attendance, setAttendance] = useState({});
      const [outsideChecks, setOutsideChecks] = useState({});

      // --- CONSTANTS ---
      const operatingDates = [
        1, 6, 7, 8, 9, 10, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 27, 28, 30
      ];
      const weekDays = ['月', '火', '水', '木', '金'];

      const getDayOfWeek = (date) => {
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        return days[(date + 2) % 7];
      };

      // --- HANDLERS ---
      const handleNameChange = (program, id, newName) => {
        setStudents(prev => ({
          ...prev,
          [program]: prev[program].map(student => 
            student.id === id ? { ...student, name: newName } : student
          )
        }));
      };

      const addStudent = (program) => {
        setStudents(prev => ({
          ...prev,
          [program]: [...prev[program], { id: generateId(), name: '' }]
        }));
      };

      const removeStudent = (program, id) => {
        setStudents(prev => ({
          ...prev,
          [program]: prev[program].filter(student => student.id !== id)
        }));
      };

      const toggleAttendance = (studentId, date) => {
        setAttendance(prev => {
          const current = prev[`${studentId}-${date}`];
          let nextState = '';
          if (!current) nextState = '〇';
          else if (current === '〇') nextState = '×';
          else if (current === '×') nextState = '△';
          
          return { ...prev, [`${studentId}-${date}`]: nextState };
        });
      };

      const toggleOutsideCheck = (studentId, day, type) => {
        const key = `${studentId}-${day}-${type}`;
        setOutsideChecks(prev => ({
          ...prev,
          [key]: !prev[key]
        }));
      };

      // Handle Excel Export
      const exportToExcel = () => {
        const currentDataArray = [];
        let filename = '';

        if (activeMainTab === 'attendance') {
          filename = `ABC_Garden_Attendance_${activeProgram}.xlsx`;
          
          // Build Headers
          const headers = ['名前 (Name)', ...operatingDates.map(date => `${date} (${getDayOfWeek(date)})`)];
          currentDataArray.push(headers);
          
          // Build Rows
          students[activeProgram].forEach(student => {
            const row = [student.name];
            operatingDates.forEach(date => {
              row.push(attendance[`${student.id}-${date}`] || '');
            });
            currentDataArray.push(row);
          });
        } else {
          filename = `ABC_Garden_Outside_${activeOutsideProgram}.xlsx`;
          
          // Build Headers
          const headers = ['名前 (Name)'];
          weekDays.forEach(day => {
            headers.push(`${day} 出 (Out)`);
            headers.push(`${day} 戻 (In)`);
          });
          currentDataArray.push(headers);

          // Build Rows
          students[activeOutsideProgram].forEach(student => {
            const row = [student.name];
            weekDays.forEach(day => {
              row.push(outsideChecks[`${student.id}-${day}-out`] ? '✓' : '');
              row.push(outsideChecks[`${student.id}-${day}-in`] ? '✓' : '');
            });
            currentDataArray.push(row);
          });
        }

        // Generate worksheet and workbook
        const ws = XLSX.utils.aoa_to_sheet(currentDataArray);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');

        // Trigger download
        XLSX.writeFile(wb, filename);
      };

      // --- RENDER HELPERS ---
      const currentStudents = activeMainTab === 'attendance' 
        ? students[activeProgram] 
        : students[activeOutsideProgram];

      return (
        <div className="min-h-screen bg-gray-50 p-4 sm:p-8 font-sans">
          {/* Main Navigation Tabs */}
          <div className="max-w-7xl mx-auto mb-6 flex space-x-2 bg-gray-200 p-1.5 rounded-xl w-fit no-print">
            <button
              onClick={() => setActiveMainTab('attendance')}
              className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all ${
                activeMainTab === 'attendance' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'
              }`}
            >
              <CalendarIcon className="w-5 h-5" />
              月間出席表 (Monthly)
            </button>
            <button
              onClick={() => setActiveMainTab('outside')}
              className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all ${
                activeMainTab === 'outside' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'
              }`}
            >
              <ClipboardCheckIcon className="w-5 h-5" />
              外出チェック (Outside Check)
            </button>
          </div>

          <div className="max-w-7xl mx-auto bg-white shadow-sm rounded-xl border border-gray-200 overflow-hidden print-border">
            
            {/* Header Content dynamically changes based on active tab */}
            <div className="p-6 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white">
              <div>
                <h1 className="text-2xl font-bold text-gray-800 print-text-black flex items-center gap-2">
                  {activeMainTab === 'attendance' ? (
                    <><CalendarIcon className="w-6 h-6 text-blue-600 no-print" /> ABC Garden 出席表 (Attendance)</>
                  ) : (
                    <><ClipboardCheckIcon className="w-6 h-6 text-blue-600 no-print" /> 外出チェック表 (Weekly Outside Check)</>
                  )}
                </h1>
                <p className="text-gray-500 mt-1 print-text-black text-sm flex items-center gap-4">
                  {activeMainTab === 'attendance' ? (
                    <>2026年 4月 | {activeProgram === 'fun' ? 'Fun English' : 'Step English'}</>
                  ) : (
                    <>
                      週 (Week of): <span className="inline-block w-32 border-b border-gray-400"></span> 
                      | {activeOutsideProgram === 'intl' ? 'International School' : 'After School'}
                    </>
                  )}
                </p>
              </div>

              <div className="flex items-center gap-4 no-print flex-wrap justify-end">
                {/* Sub-program toggles */}
                <div className="flex bg-gray-100 p-1 rounded-lg">
                  {activeMainTab === 'attendance' ? (
                    <>
                      <button onClick={() => setActiveProgram('fun')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeProgram === 'fun' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>Fun English</button>
                      <button onClick={() => setActiveProgram('step')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeProgram === 'step' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>Step English</button>
                    </>
                  ) : (
                    <>
                      <button onClick={() => setActiveOutsideProgram('intl')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeOutsideProgram === 'intl' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>International School</button>
                      <button onClick={() => setActiveOutsideProgram('after')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeOutsideProgram === 'after' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>After School</button>
                    </>
                  )}
                </div>
                
                <button
                  onClick={exportToExcel}
                  className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors shadow-sm text-sm font-medium"
                >
                  <DownloadIcon className="w-4 h-4" />
                  Excel出力 (Export)
                </button>
                
                <button
                  onClick={() => window.print()}
                  className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors shadow-sm text-sm font-medium"
                >
                  <PrinterIcon className="w-4 h-4" />
                  印刷 (Print)
                </button>
              </div>
            </div>

            {/* Legend for Monthly Attendance only */}
            {activeMainTab === 'attendance' && (
              <div className="px-6 py-3 bg-gray-50 border-b border-gray-200 text-sm text-gray-600 flex gap-6 print-text-black print:bg-white">
                <span className="flex items-center gap-1"><span className="font-bold text-green-600 print-text-black">〇</span> 出席 (Present)</span>
                <span className="flex items-center gap-1"><span className="font-bold text-red-600 print-text-black">×</span> 欠席 (Absent)</span>
                <span className="flex items-center gap-1"><span className="font-bold text-orange-500 print-text-black">△</span> 遅刻 (Late)</span>
              </div>
            )}

            {/* Tables */}
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-max">
                
                {/* Headers */}
                <thead>
                  {activeMainTab === 'attendance' ? (
                    <tr>
                      <th className="sticky left-0 z-10 bg-gray-100 print:bg-gray-100 p-3 border-b border-r border-gray-200 font-semibold text-gray-700 w-48 shadow-[1px_0_0_0_#e5e7eb] print:shadow-none print:border-black print-bg-gray">
                        名前 (Name)
                      </th>
                      {operatingDates.map(date => (
                        <th key={date} className="p-2 border-b border-r border-gray-200 text-center min-w-[40px] print:border-black">
                          <div className="font-bold text-gray-800 print-text-black">{date}</div>
                          <div className="text-xs text-gray-500 print-text-black">{getDayOfWeek(date)}</div>
                        </th>
                      ))}
                      <th className="p-3 border-b border-gray-200 font-semibold text-gray-700 text-center no-print w-16">操作</th>
                    </tr>
                  ) : (
                    <React.Fragment>
                      <tr>
                        <th rowSpan="2" className="sticky left-0 z-10 bg-gray-100 print:bg-gray-100 p-3 border-b border-r border-gray-200 font-semibold text-gray-700 w-48 shadow-[1px_0_0_0_#e5e7eb] print:shadow-none print:border-black align-bottom print-bg-gray">
                          名前 (Name)
                        </th>
                        {weekDays.map(day => (
                          <th key={day} colSpan="2" className="p-2 border-b border-r border-gray-200 text-center font-bold text-gray-800 print-text-black print:border-black bg-gray-50 print-bg-gray">
                            {day}
                          </th>
                        ))}
                        <th rowSpan="2" className="p-3 border-b border-gray-200 font-semibold text-gray-700 text-center no-print w-16 align-bottom">操作</th>
                      </tr>
                      <tr>
                        {weekDays.map(day => (
                          <React.Fragment key={`${day}-sub`}>
                            <th className="p-1.5 border-b border-r border-gray-200 text-center text-sm font-medium text-gray-600 print-text-black print:border-black w-14">出 (Out)</th>
                            <th className="p-1.5 border-b border-r border-gray-200 text-center text-sm font-medium text-gray-600 print-text-black print:border-black w-14">戻 (In)</th>
                          </React.Fragment>
                        ))}
                      </tr>
                    </React.Fragment>
                  )}
                </thead>

                {/* Body */}
                <tbody>
                  {currentStudents.map((student, index) => (
                    <tr key={student.id} className="hover:bg-blue-50/50 group transition-colors">
                      
                      {/* Name Input */}
                      <td className="sticky left-0 z-10 bg-white group-hover:bg-blue-50/50 print:bg-white p-0 border-b border-r border-gray-200 shadow-[1px_0_0_0_#e5e7eb] print:shadow-none print:border-black">
                        <input
                          type="text"
                          value={student.name}
                          onChange={(e) => handleNameChange(activeMainTab === 'attendance' ? activeProgram : activeOutsideProgram, student.id, e.target.value)}
                          placeholder={`Student ${index + 1}`}
                          className="w-full h-full p-3 bg-transparent border-none focus:ring-2 focus:ring-inset focus:ring-blue-500 outline-none text-gray-800 print-text-black placeholder:text-gray-300"
                        />
                      </td>

                      {/* Dynamic Columns based on tab */}
                      {activeMainTab === 'attendance' ? (
                        // Monthly Attendance Columns
                        operatingDates.map(date => {
                          const status = attendance[`${student.id}-${date}`];
                          return (
                            <td 
                              key={date} 
                              onClick={() => toggleAttendance(student.id, date)}
                              className="p-0 border-b border-r border-gray-200 text-center cursor-pointer hover:bg-gray-100 transition-colors print:border-black align-middle h-12"
                            >
                              <span className={`select-none font-bold text-lg
                                ${status === '〇' ? 'text-green-600 print-text-black' : ''}
                                ${status === '×' ? 'text-red-600 print-text-black' : ''}
                                ${status === '△' ? 'text-orange-500 print-text-black' : ''}
                              `}>
                                {status || ''}
                              </span>
                            </td>
                          );
                        })
                      ) : (
                        // Weekly Outside Check Columns
                        weekDays.map(day => (
                          <React.Fragment key={`${student.id}-${day}`}>
                            <td 
                              onClick={() => toggleOutsideCheck(student.id, day, 'out')}
                              className="p-0 border-b border-r border-gray-200 text-center cursor-pointer hover:bg-gray-100 transition-colors print:border-black align-middle h-12"
                            >
                              <span className="select-none font-bold text-xl text-green-600 print-text-black">
                                {outsideChecks[`${student.id}-${day}-out`] ? '✓' : ''}
                              </span>
                            </td>
                            <td 
                              onClick={() => toggleOutsideCheck(student.id, day, 'in')}
                              className="p-0 border-b border-r border-gray-200 text-center cursor-pointer hover:bg-gray-100 transition-colors print:border-black align-middle h-12"
                            >
                              <span className="select-none font-bold text-xl text-green-600 print-text-black">
                                {outsideChecks[`${student.id}-${day}-in`] ? '✓' : ''}
                              </span>
                            </td>
                          </React.Fragment>
                        ))
                      )}

                      {/* Delete Action */}
                      <td className="p-2 border-b border-gray-200 text-center no-print">
                        <button
                          onClick={() => removeStudent(activeMainTab === 'attendance' ? activeProgram : activeOutsideProgram, student.id)}
                          className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                          title="Remove student"
                        >
                          <Trash2Icon className="w-4 h-4" />
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Add Student Button */}
            <div className="p-4 border-t border-gray-200 bg-white no-print">
              <button
                onClick={() => addStudent(activeMainTab === 'attendance' ? activeProgram : activeOutsideProgram)}
                className="flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 font-medium px-2 py-1 rounded-md hover:bg-blue-50 transition-colors"
              >
                <UserPlusIcon className="w-4 h-4" />
                生徒を追加 (Add Student)
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
