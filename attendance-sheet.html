<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Garden 出席表</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM for logic -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Print-specific styles optimized for A4 Landscape handwriting/lamination */
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      
      /* Force black borders and text for the printed grid */
      .print-border { border: 2px solid black !important; }
      .print-border-cell { border: 1px solid black !important; }
      .print-text-black { color: black !important; }
      .print-bg-gray { background-color: #f3f4f6 !important; }
      
      /* Table scaling fixes for 31 days to fit on one page */
      table { table-layout: fixed !important; width: 100% !important; max-width: 100% !important; }
      th, td { min-width: 0 !important; } /* Overrides minimum widths to prevent page spill */
      
      /* Force exactly equal column widths in print so 1-9 don't shrink */
      .print-col-name { width: 15% !important; }
      .print-col-date { width: 2.74% !important; } /* 85% / 31 days */
      
      /* Ensure inputs print seamlessly as text */
      input { border: none !important; background: transparent !important; color: black !important; }
      input::placeholder { color: transparent !important; }
      input::-webkit-input-placeholder { color: transparent !important; }
      input::-moz-placeholder { color: transparent !important; }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- React App Target -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

    // --- ICON COMPONENTS ---
    const CalendarIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>;
    const ClipboardCheckIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>;
    const PrinterIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>;
    const UserPlusIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;
    const Trash2Icon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;

    // --- MAIN APP COMPONENT ---
    const App = () => {
      // --- STATE ---
      const [activeMainTab, setActiveMainTab] = useState('attendance');
      const [activeProgram, setActiveProgram] = useState('intl');
      const [activeOutsideProgram, setActiveOutsideProgram] = useState('intl');

      // Setup blank slates for typing in names
      const [students, setStudents] = useState({
        fun: Array.from({ length: 5 }, () => ({ id: generateId(), name: '' })),
        step: Array.from({ length: 5 }, () => ({ id: generateId(), name: '' })),
        intl: Array.from({ length: 12 }, () => ({ id: generateId(), name: '' })),
        after: Array.from({ length: 6 }, () => ({ id: generateId(), name: '' }))
      });

      // --- CONSTANTS ---
      // 1 to 31 for generic reusable month
      const operatingDates = Array.from({ length: 31 }, (_, i) => i + 1);
      const weekDays = ['月', '火', '水', '木', '金'];

      // --- HANDLERS ---
      const handleNameChange = (program, id, newName) => {
        setStudents(prev => ({
          ...prev,
          [program]: prev[program].map(student => 
            student.id === id ? { ...student, name: newName } : student
          )
        }));
      };

      const addStudent = (program) => {
        setStudents(prev => ({
          ...prev,
          [program]: [...prev[program], { id: generateId(), name: '' }]
        }));
      };

      const removeStudent = (program, id) => {
        setStudents(prev => ({
          ...prev,
          [program]: prev[program].filter(student => student.id !== id)
        }));
      };

      // --- RENDER HELPERS ---
      const currentStudents = activeMainTab === 'attendance' 
        ? students[activeProgram] 
        : students[activeOutsideProgram];

      return (
        <div className="min-h-screen bg-gray-50 p-4 sm:p-8 font-sans">
          {/* Main Navigation Tabs */}
          <div className="max-w-7xl mx-auto mb-4 flex space-x-2 bg-gray-200 p-1.5 rounded-xl w-fit no-print">
            <button
              onClick={() => setActiveMainTab('attendance')}
              className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all ${
                activeMainTab === 'attendance' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'
              }`}
            >
              <CalendarIcon className="w-5 h-5" />
              月間出席表 (Monthly)
            </button>
            <button
              onClick={() => setActiveMainTab('outside')}
              className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all ${
                activeMainTab === 'outside' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'
              }`}
            >
              <ClipboardCheckIcon className="w-5 h-5" />
              外出チェック (Outside Check)
            </button>
          </div>

          <div className="max-w-7xl mx-auto bg-blue-50 border-l-4 border-blue-400 p-4 mb-6 rounded-r-lg no-print">
            <p className="text-blue-800 text-sm">
              <strong>印刷用セットアップ画面:</strong> 生徒名を入力し、プログラムを選択して「印刷 (Print)」を押してください。印刷してラミネート加工するための空欄の表が作成されます。
              <br/>
              (Setup screen for printing: Enter student names, select your program, and press Print to generate a blank sheet ready for lamination.)
            </p>
          </div>

          <div className="max-w-7xl mx-auto bg-white shadow-sm rounded-xl print-border border-2 border-gray-400 overflow-hidden">
            
            {/* Header Content */}
            <div className="p-4 sm:p-6 border-b-2 border-gray-400 print-border-cell flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white">
              <div>
                <h1 className="text-2xl font-bold text-gray-800 print-text-black flex items-center gap-2">
                  {activeMainTab === 'attendance' ? (
                    <><CalendarIcon className="w-6 h-6 text-gray-600 no-print" /> ABC Garden 出席表 (Attendance)</>
                  ) : (
                    <><ClipboardCheckIcon className="w-6 h-6 text-gray-600 no-print" /> 外出チェック表 (Monthly Outside Check)</>
                  )}
                </h1>
                <p className="text-gray-600 mt-2 print-text-black font-medium flex items-end gap-2">
                  {activeMainTab === 'attendance' ? (
                    <>
                      <span>年 (Year):</span> <span className="inline-block w-16 border-b border-gray-800 print:border-black mb-1"></span> 
                      <span className="ml-2">月 (Month):</span> <span className="inline-block w-12 border-b border-gray-800 print:border-black mb-1"></span> 
                      <span className="ml-2">| {activeProgram === 'intl' ? 'International School' : activeProgram === 'fun' ? 'Fun English' : 'Step English'}</span>
                    </>
                  ) : (
                    <>
                      <span>年 (Year):</span> <span className="inline-block w-16 border-b border-gray-800 print:border-black mb-1"></span> 
                      <span className="ml-2">月 (Month):</span> <span className="inline-block w-12 border-b border-gray-800 print:border-black mb-1"></span> 
                      <span className="ml-2">| {activeOutsideProgram === 'intl' ? 'International School' : 'After School'}</span>
                    </>
                  )}
                </p>
              </div>

              <div className="flex items-center gap-4 no-print flex-wrap justify-end">
                {/* Sub-program toggles */}
                <div className="flex bg-gray-100 p-1 rounded-lg">
                  {activeMainTab === 'attendance' ? (
                    <>
                      <button onClick={() => setActiveProgram('intl')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeProgram === 'intl' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>International School</button>
                      <button onClick={() => setActiveProgram('fun')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeProgram === 'fun' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>Fun English</button>
                      <button onClick={() => setActiveProgram('step')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeProgram === 'step' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>Step English</button>
                    </>
                  ) : (
                    <>
                      <button onClick={() => setActiveOutsideProgram('intl')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeOutsideProgram === 'intl' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>International School</button>
                      <button onClick={() => setActiveOutsideProgram('after')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeOutsideProgram === 'after' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>After School</button>
                    </>
                  )}
                </div>
                
                <button
                  onClick={() => window.print()}
                  className="flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors shadow-sm text-sm font-medium"
                >
                  <PrinterIcon className="w-5 h-5" />
                  印刷 (Print)
                </button>
              </div>
            </div>

            {/* Legend for Monthly Attendance */}
            {activeMainTab === 'attendance' && (
              <div className="px-6 py-2 bg-gray-50 border-b-2 border-gray-400 print-border-cell text-sm text-gray-700 flex gap-6 print-text-black print:bg-white font-medium">
                <span><strong className="text-lg">〇</strong> : 出席 (Present)</span>
                <span><strong className="text-lg">×</strong> : 欠席 (Absent)</span>
                <span><strong className="text-lg">△</strong> : 遅刻 (Late)</span>
              </div>
            )}

            {/* Tables */}
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-max bg-white print:min-w-full print:table-fixed">
                
                {/* Colgroup explicitly overrides the browser's attempt to shrink column 1 compared to 10
                  by dictating absolute equal distribution widths for all columns.
                */}
                <colgroup>
                  <col className="w-32 sm:w-48 print-col-name" />
                  {operatingDates.map(date => <col key={date} className="print-col-date" />)}
                  {activeMainTab === 'attendance' && <col className="w-16 no-print" />}
                </colgroup>

                {/* Headers */}
                <thead>
                  {activeMainTab === 'attendance' ? (
                    <tr>
                      <th className="sticky left-0 z-10 bg-gray-100 print-bg-gray p-2 sm:p-3 border-b-2 border-r-2 border-gray-400 print-border-cell font-bold text-gray-800 print:static print:shadow-none shadow-[2px_0_0_0_#9ca3af] print:text-sm">
                        名前 (Name)
                      </th>
                      {operatingDates.map(date => (
                        <th key={date} className="w-8 sm:w-10 min-w-[32px] sm:min-w-[40px] p-0.5 border-b-2 border-r border-gray-400 print-border-cell text-center print:p-0">
                          <div className="font-bold text-gray-800 print-text-black text-[11px] sm:text-base print:text-xs">{date}</div>
                        </th>
                      ))}
                      <th className="p-3 border-b-2 border-gray-400 font-semibold text-gray-700 text-center no-print">操作</th>
                    </tr>
                  ) : (
                    <tr>
                      <th className="sticky left-0 z-10 bg-gray-100 print-bg-gray p-2 sm:p-3 border-b-2 border-r-2 border-gray-400 print-border-cell font-bold text-gray-800 print:static print:shadow-none shadow-[2px_0_0_0_#9ca3af] print:text-sm">
                        項目 (Item)
                      </th>
                      {operatingDates.map(date => (
                        <th key={date} className="w-8 sm:w-10 min-w-[32px] sm:min-w-[40px] p-0.5 border-b-2 border-r border-gray-400 print-border-cell text-center print:p-0">
                          <div className="font-bold text-gray-800 print-text-black text-[11px] sm:text-base print:text-xs">{date}</div>
                        </th>
                      ))}
                    </tr>
                  )}
                </thead>

                {/* Body */}
                <tbody>
                  {activeMainTab === 'attendance' ? (
                    currentStudents.map((student, index) => (
                      <tr key={student.id}>
                        
                        {/* Name Input */}
                        <td className="sticky left-0 z-10 bg-white print:bg-white p-0 border-b border-r-2 border-gray-400 print-border-cell print:static print:shadow-none shadow-[2px_0_0_0_#9ca3af]">
                          <input
                            type="text"
                            value={student.name}
                            onChange={(e) => handleNameChange(activeProgram, student.id, e.target.value)}
                            placeholder={`生徒 ${index + 1}`}
                            className="w-full h-8 sm:h-10 print:h-8 p-2 bg-transparent border-none focus:ring-2 focus:ring-inset focus:ring-blue-500 outline-none font-medium text-gray-900 print-text-black placeholder:text-gray-300 print:placeholder-transparent text-sm sm:text-base print:text-sm"
                          />
                        </td>

                        {/* Blank Spaces for Analog Handwriting */}
                        {operatingDates.map(date => (
                          <td 
                            key={date} 
                            className="p-0 border-b border-r border-gray-400 print-border-cell h-8 sm:h-10 print:h-8"
                          ></td>
                        ))}

                        {/* Delete Action (Screen Only) */}
                        <td className="p-2 border-b border-gray-400 text-center no-print">
                          <button
                            onClick={() => removeStudent(activeProgram, student.id)}
                            className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                            title="生徒を削除 (Remove student)"
                          >
                            <Trash2Icon className="w-5 h-5 mx-auto" />
                          </button>
                        </td>
                      </tr>
                    ))
                  ) : (
                    [
                      { key: 'out', jp: '出発時の人数', en: 'Number Out' },
                      { key: 'arrive', jp: '公園到着時の人数', en: 'Number Arrived' },
                      { key: 'leave', jp: '公園出発時の人数', en: 'Number Left' },
                      { key: 'in', jp: '戻り時の人数', en: 'Number In' },
                      { key: 'pic', jp: '写真撮影', en: 'Picture Taken' },
                    ].map(row => (
                      <tr key={row.key}>
                        <td className="sticky left-0 z-10 bg-white print:bg-white p-2 sm:p-3 border-b-2 border-r-2 border-gray-400 print-border-cell print:static print:shadow-none shadow-[2px_0_0_0_#9ca3af] align-middle">
                          <div className="font-bold text-gray-800 text-sm sm:text-base print:text-[13px] print-text-black leading-tight">{row.jp}</div>
                          <div className="font-semibold text-gray-600 text-[10px] sm:text-[12px] print:text-[10px] print-text-black mt-1 leading-none">{row.en}</div>
                        </td>
                        {operatingDates.map(date => (
                          <td key={`${row.key}-${date}`} className="p-0 border-b border-r border-gray-400 print-border-cell h-14 sm:h-20 print:h-16"></td>
                        ))}
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>

            {/* Add Student Button (Only for Attendance Tab) */}
            {activeMainTab === 'attendance' && (
              <div className="p-4 border-t-2 border-gray-400 bg-white no-print">
                <button
                  onClick={() => addStudent(activeProgram)}
                  className="flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 font-medium px-3 py-2 rounded-md hover:bg-blue-50 transition-colors"
                >
                  <UserPlusIcon className="w-4 h-4" />
                  生徒を追加 (Add Student Row)
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
