<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Garden - Lead Profile Manager</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #FAF8F5; /* ABC Garden warm off-white */
      color: #1f2937;
    }
    
    /* Animations */
    .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to { opacity: 1; backdrop-filter: blur(2px); }
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @media print {
      @page { 
        size: portrait A4; 
        margin: 10mm; /* Tightened margin to maximize writing space */
      }
      html, body { 
        background-color: white !important; 
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
        margin: 0 !important;
        padding: 0 !important;
        height: 100% !important;
      }
      .no-print { display: none !important; }
      
      /* Reset modal backdrop for printing */
      .modal-backdrop-print {
        position: static !important;
        width: 100% !important;
        background: transparent !important;
        backdrop-filter: none !important;
        padding: 0 !important;
        margin: 0 !important;
        display: block !important; /* Force block to prevent flex-pagination bugs */
      }

      /* Take over the whole page, stripping scrollbars/styles */
      .print-modal-content {
        position: static !important;
        width: 100% !important;
        max-height: none !important;
        height: auto !important;
        box-shadow: none !important;
        border: none !important;
        transform: none !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
        display: block !important; /* Force block to prevent flex-pagination bugs */
      }

      /* Wrapper for scrollable area - must be visible in print */
      .print-scroll-container {
        overflow: visible !important;
        height: auto !important;
        display: block !important;
        padding: 0 !important;
      }

      /* Force the inner page container to equal exactly 1 A4 page height */
      .print-a4-page {
        height: 275mm !important; /* Safely within 297mm minus margins */
        max-height: 275mm !important;
        display: flex !important;
        flex-direction: column !important;
        box-sizing: border-box !important;
        overflow: hidden !important; /* Prevent 1px spillover causing blank pages */
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        page-break-after: always !important;
        break-after: page !important;
        margin: 0 !important; /* Strip browser margins */
        padding: 0 !important;
        border: none !important;
      }

      .print-a4-page:last-child {
        page-break-after: auto !important;
        break-after: auto !important;
      }

      /* Flex utility to force the "Notes" section to stretch */
      .print-flex-1 {
        flex: 1 1 0% !important;
      }
      
      /* Force borders to print black and crisp */
      .print-border { border: 1px solid #000 !important; }
      .print-border-b { border-bottom: 1px solid #000 !important; }
      .print-border-r { border-right: 1px solid #000 !important; }
      .print-border-l { border-left: 1px solid #000 !important; }
      .print-bg-gray { background-color: #f3f4f6 !important; }
      .print-text-black { color: #000 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

    // --- ICONS ---
    const UserPlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;
    const PreviousLeadsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
    const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const PrinterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>;
    const Trash2Icon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const EditIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
    const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const UploadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const FileTextIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
    const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const FilterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;

    // Updated empty profile matching the punchy labels and adding Source
    const emptyProfile = {
      id: '',
      dateCreated: '',
      parentName: '',        // 氏名
      childNameAge: '',      // お子さまのお名前・年齢
      email: '',             // メールアドレス
      phone: '',             // 電話番号
      contactMethod: '',     // 連絡方法
      program: '',           // 希望プログラム
      trialDate: '',         // 希望体験日
      session: '',           // 希望セッション
      ward: '',              // お住まいの区
      interests: '',         // 知りたい内容
      requests: '',          // ご希望やご質問
      source: '',            // 情報源 (Added based on Google Form)
      sourceOther: '',       // 情報源のその他テキスト
      notes: ''              // その他 (Will stretch in print)
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('create'); // 'create' or 'previous-leads'
      const [profiles, setProfiles] = useState(() => {
        const saved = localStorage.getItem('abc_lead_profiles');
        return saved ? JSON.parse(saved) : [];
      });
      const [formData, setFormData] = useState({ ...emptyProfile });
      const [editingId, setEditingId] = useState(null);
      const [profilesToPrint, setProfilesToPrint] = useState(null); // Array of profiles to print, or null
      
      // Filter State
      const [searchQuery, setSearchQuery] = useState('');
      const [filterProgram, setFilterProgram] = useState('');
      const [filterWard, setFilterWard] = useState('');
      const [filterSource, setFilterSource] = useState('');

      const shouldPrintRef = useRef(true);

      useEffect(() => {
        localStorage.setItem('abc_lead_profiles', JSON.stringify(profiles));
      }, [profiles]);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        
        // Reset session if program changes
        if (name === 'program') {
            setFormData(prev => ({ ...prev, [name]: value, session: '' }));
        } else {
            setFormData(prev => ({ ...prev, [name]: value }));
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        
        let savedProfile;

        if (editingId) {
          savedProfile = { ...formData };
          setProfiles(profiles.map(p => p.id === editingId ? savedProfile : p));
          setEditingId(null);
          setActiveTab('previous-leads');
        } else {
          savedProfile = { 
            ...formData, 
            id: generateId(),
            dateCreated: new Date().toISOString()
          };
          setProfiles([savedProfile, ...profiles]);
        }
        
        setFormData({ ...emptyProfile });
        
        if (shouldPrintRef.current) {
          // Immediately open the print modal for the single profile
          setProfilesToPrint([savedProfile]);
        }

        // Reset default behavior
        shouldPrintRef.current = true;
      };

      const handleEdit = (profile) => {
        setFormData({ ...profile });
        setEditingId(profile.id);
        setActiveTab('create');
      };

      const handleDelete = (id, name) => {
        if (window.confirm(`Are you sure you want to delete the profile for ${name}?`)) {
          setProfiles(profiles.filter(p => p.id !== id));
        }
      };

      const handleCancelEdit = () => {
        setFormData({ ...emptyProfile });
        setEditingId(null);
      };

      const clearFilters = () => {
        setFilterProgram('');
        setFilterWard('');
        setFilterSource('');
        setSearchQuery('');
      };

      // Import/Export Logic
      const handleExport = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(profiles, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `abc_leads_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const handleImport = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = JSON.parse(e.target.result);
            if (Array.isArray(parsed)) {
              setProfiles(parsed);
              alert("Previous leads imported successfully!");
            }
          } catch (err) {
            alert("Invalid file format.");
          }
          event.target.value = null; 
        };
        reader.readAsText(file);
      };

      const filteredProfiles = useMemo(() => {
        let filtered = profiles;

        // Text Search Filter
        if (searchQuery) {
          const lowerQ = searchQuery.toLowerCase();
          filtered = filtered.filter(p => 
            (p.parentName && p.parentName.toLowerCase().includes(lowerQ)) ||
            (p.childNameAge && p.childNameAge.toLowerCase().includes(lowerQ)) ||
            (p.email && p.email.toLowerCase().includes(lowerQ)) ||
            (p.phone && p.phone.includes(lowerQ)) ||
            (p.sourceOther && p.sourceOther.toLowerCase().includes(lowerQ))
          );
        }

        // Dropdown Filters
        if (filterProgram) {
          filtered = filtered.filter(p => p.program === filterProgram);
        }
        if (filterWard) {
          filtered = filtered.filter(p => p.ward === filterWard);
        }
        if (filterSource) {
          filtered = filtered.filter(p => p.source === filterSource);
        }

        return filtered;
      }, [profiles, searchQuery, filterProgram, filterWard, filterSource]);

      const formatDate = (isoString) => {
        if (!isoString) return '';
        const date = new Date(isoString);
        return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
      };

      const TabButton = ({ id, icon: Icon, label }) => (
        <button
          onClick={() => {
            setActiveTab(id);
            if (id === 'create' && !editingId) setFormData({ ...emptyProfile });
          }}
          className={`flex items-center gap-2 px-6 py-3.5 font-black rounded-t-xl transition-all border-b-4 ${activeTab === id ? 'bg-white text-[#1E88E5] border-[#1E88E5] shadow-sm' : 'bg-[#f0ece1] text-gray-500 border-transparent hover:bg-[#e6e1d6]'}`}
        >
          <Icon /> {label}
        </button>
      );

      // Session options based on selected program
      const renderSessionOptions = () => {
        if (formData.program === "インターナショナルスクール 3‐5歳") {
          return (
            <>
              <option value="10:00（インターナショナルスクール 3‐5歳）">10:00（インターナショナルスクール 3‐5歳）</option>
              <option value="13:00（インターナショナルスクール 3‐5歳）">13:00（インターナショナルスクール 3‐5歳）</option>
            </>
          );
        } else if (formData.program === "英会話スクール 小学生") {
          return (
            <>
              <option value="11:00（英会話スクール 小学生）">11:00（英会話スクール 小学生）</option>
              <option value="14:00（英会話スクール 小学生）">14:00（英会話スクール 小学生）</option>
            </>
          );
        }
        return <option value="" disabled>先に希望プログラムを選択してください</option>; // "Please select a program first"
      };

      // Main UI Render
      return (
        <div className="min-h-screen p-4 sm:p-8 relative">
          
          {/* Main App Container (Hidden during print) */}
          <div className="max-w-6xl mx-auto flex flex-col gap-6 no-print">
            
            {/* Header */}
            <div className="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b-2 border-gray-200 pb-6">
              <div>
                <div className="flex items-center gap-3">
                  <a href="index.html" className="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <img 
                      src="abc-horizontal-block-tilted-mono.png" 
                      alt="ABC Garden Logo" 
                      className="h-12 w-auto object-contain"
                      onError={(e) => { 
                        e.target.style.display = 'none'; 
                        e.target.nextSibling.style.display = 'block';
                      }}
                    />
                    <h1 className="text-3xl font-black hidden text-gray-800">ABC Garden</h1>
                  </a>
                  <span className="text-2xl font-black text-gray-800 border-l-2 border-gray-200 pl-3 ml-1 hidden sm:block">Lead Manager</span>
                </div>
                <p className="text-gray-500 font-bold ml-1 mt-2 sm:mt-1">Lead Profile Management System</p>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex gap-2 border-b-4 border-gray-200">
              <TabButton id="create" icon={UserPlusIcon} label={editingId ? "Edit Profile" : "Create Profile"} />
              <TabButton id="previous-leads" icon={PreviousLeadsIcon} label="Previous Leads" />
            </div>

            {/* --- TAB 1: CREATE / EDIT PROFILE --- */}
            {activeTab === 'create' && (
              <div className="bg-white shadow-sm rounded-2xl border border-gray-200 p-6 md:p-8 animate-fadeIn">
                <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                  <h2 className="text-2xl font-black text-gray-800 flex items-center gap-2">
                    <FileTextIcon className="w-6 h-6 text-[#1E88E5]" /> 
                    {editingId ? 'Edit Profile Data' : 'New Lead Profile'}
                  </h2>
                  {editingId && (
                    <button onClick={handleCancelEdit} className="text-sm font-bold text-gray-500 hover:text-gray-800 bg-gray-100 px-4 py-2 rounded-lg transition-colors">
                      Cancel Editing
                    </button>
                  )}
                </div>

                <form onSubmit={handleSubmit} className="space-y-6">
                  {/* Basic Info */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">氏名 (Parent Name) <span className="text-red-500">*</span></label>
                      <input required type="text" name="parentName" value={formData.parentName} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800" placeholder="e.g. Yamada Taro" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">お子さまのお名前・年齢 (Child Name & Age) <span className="text-red-500">*</span></label>
                      <input required type="text" name="childNameAge" value={formData.childNameAge} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800" placeholder="e.g. Yamada Hanako, 5" />
                    </div>
                  </div>

                  {/* Contact Info */}
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">メールアドレス (Email)</label>
                      <input type="email" name="email" value={formData.email} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">電話番号 (Phone Number)</label>
                      <input type="tel" name="phone" value={formData.phone} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">連絡方法 (Contact Method)</label>
                      <select name="contactMethod" value={formData.contactMethod} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800">
                        <option value="">-- Select --</option>
                        <option value="Phone">Phone</option>
                        <option value="Email">Email</option>
                        <option value="Both">Both</option>
                      </select>
                    </div>
                  </div>

                  <hr className="border-gray-100" />

                  {/* Program Preferences */}
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">希望体験日 (Trial Date)</label>
                      <input type="date" name="trialDate" value={formData.trialDate} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">希望プログラム (Program)</label>
                      <select name="program" value={formData.program} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800">
                        <option value="">-- Select --</option>
                        <option value="インターナショナルスクール 3‐5歳">インターナショナルスクール 3‐5歳</option>
                        <option value="英会話スクール 小学生">英会話スクール 小学生</option>
                      </select>
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">希望セッション (Session)</label>
                      <select 
                        name="session" 
                        value={formData.session} 
                        onChange={handleInputChange} 
                        className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800"
                      >
                        <option value="">-- Select --</option>
                        {renderSessionOptions()}
                      </select>
                    </div>
                  </div>

                  {/* Ward and Source */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">お住まいの区 (Ward/Residence)</label>
                      <select name="ward" value={formData.ward} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800">
                        <option value="">-- Select --</option>
                        <option value="門司区">門司区</option>
                        <option value="小倉北区">小倉北区</option>
                        <option value="小倉南区">小倉南区</option>
                        <option value="若松区">若松区</option>
                        <option value="八幡東区">八幡東区</option>
                        <option value="八幡西区">八幡西区</option>
                        <option value="戸畑区">戸畑区</option>
                        <option value="その他">その他</option>
                      </select>
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">情報源 (Source / How did they hear?)</label>
                      <select name="source" value={formData.source} onChange={handleInputChange} className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800">
                        <option value="">-- Select --</option>
                        <option value="教育方針について">教育方針について</option>
                        <option value="費用">費用</option>
                        <option value="その他">その他</option>
                      </select>
                      {formData.source === 'その他' && (
                        <input 
                          type="text" 
                          name="sourceOther" 
                          value={formData.sourceOther || ''} 
                          onChange={handleInputChange} 
                          className="mt-2 p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-bold text-gray-800" 
                          placeholder="詳細をご記入ください..." 
                        />
                      )}
                    </div>
                  </div>

                  <hr className="border-gray-100" />

                  {/* Long Form Questions */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">知りたい内容 (Interests / Wants to know)</label>
                      <textarea name="interests" value={formData.interests} onChange={handleInputChange} rows="3" className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-medium resize-y"></textarea>
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">ご希望やご質問 (Requests / Questions)</label>
                      <textarea name="requests" value={formData.requests} onChange={handleInputChange} rows="3" className="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 text-sm font-medium resize-y"></textarea>
                    </div>
                  </div>

                  {/* Notes */}
                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">その他 (Other / Internal Notes)</label>
                    <textarea name="notes" value={formData.notes} onChange={handleInputChange} rows="2" className="p-3 border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-[#1E88E5] bg-blue-50 text-sm font-medium resize-y" placeholder="(Will expand into a large box when printed)"></textarea>
                  </div>

                  <div className="flex justify-end pt-4 border-t border-gray-100 gap-3">
                    {editingId ? (
                      <>
                        <button type="submit" onClick={() => shouldPrintRef.current = false} className="flex items-center gap-2 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-black rounded-xl shadow-sm transition-transform active:scale-95">
                          Save Changes
                        </button>
                        <button type="submit" onClick={() => shouldPrintRef.current = true} className="flex items-center gap-2 px-8 py-3 bg-[#1E88E5] hover:bg-blue-600 text-white font-black rounded-xl shadow-sm transition-transform active:scale-95">
                          <PrinterIcon /> Save & Print
                        </button>
                      </>
                    ) : (
                      <button type="submit" onClick={() => shouldPrintRef.current = true} className="flex items-center gap-2 px-8 py-3 bg-[#1E88E5] hover:bg-blue-600 text-white font-black rounded-xl shadow-sm transition-transform active:scale-95">
                        <UserPlusIcon /> Save & Print
                      </button>
                    )}
                  </div>
                </form>
              </div>
            )}

            {/* --- TAB 2: PREVIOUS LEADS --- */}
            {activeTab === 'previous-leads' && (
              <div className="flex flex-col gap-6 animate-fadeIn">
                <div className="bg-white p-4 sm:p-6 border border-gray-200 shadow-sm rounded-2xl flex flex-col items-start gap-4">
                  
                  {/* Top Action Row */}
                  <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center w-full gap-4">
                    <div className="flex items-center gap-3">
                      <PreviousLeadsIcon className="text-[#1E88E5]" />
                      <div>
                        <h2 className="text-xl font-bold text-gray-800">Previous Leads</h2>
                        <p className="text-sm font-medium text-gray-500">{filteredProfiles.length} Profiles Found</p>
                      </div>
                    </div>
                    
                    <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                      <div className="relative flex-1 lg:w-64">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                          <SearchIcon className="w-4 h-4 text-gray-400" />
                        </div>
                        <input 
                          type="text" 
                          value={searchQuery}
                          onChange={e => setSearchQuery(e.target.value)}
                          placeholder="Search texts..." 
                          className="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#1E88E5] bg-gray-50 font-bold"
                        />
                      </div>
                      <label className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-[#1E88E5] border border-blue-200 rounded-lg text-sm font-bold hover:bg-blue-50 transition-colors cursor-pointer shadow-sm">
                        <DownloadIcon /> Import
                        <input type="file" accept=".json" onChange={handleImport} className="hidden" />
                      </label>
                      <button onClick={handleExport} className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-[#1E88E5] border border-blue-200 rounded-lg text-sm font-bold hover:bg-blue-50 transition-colors shadow-sm">
                        <UploadIcon /> Export
                      </button>
                      {filteredProfiles.length > 0 && (
                        <button onClick={() => setProfilesToPrint(filteredProfiles)} className="flex items-center gap-2 px-4 py-2 bg-[#1E88E5] text-white rounded-lg text-sm font-bold hover:bg-blue-600 transition-colors shadow-sm">
                          <PrinterIcon /> Print All
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Filter Row */}
                  <div className="flex flex-wrap items-center gap-3 w-full pt-4 border-t border-gray-100">
                    <div className="flex items-center gap-2 text-gray-500 font-bold text-sm">
                      <FilterIcon /> Filters:
                    </div>
                    <select 
                      value={filterProgram} 
                      onChange={e => setFilterProgram(e.target.value)} 
                      className="p-2 border border-gray-200 rounded-lg text-sm font-bold text-gray-700 bg-gray-50 outline-none focus:ring-2 focus:ring-[#1E88E5]"
                    >
                      <option value="">すべてのプログラム (All Programs)</option>
                      <option value="インターナショナルスクール 3‐5歳">インターナショナルスクール 3‐5歳</option>
                      <option value="英会話スクール 小学生">英会話スクール 小学生</option>
                    </select>

                    <select 
                      value={filterWard} 
                      onChange={e => setFilterWard(e.target.value)} 
                      className="p-2 border border-gray-200 rounded-lg text-sm font-bold text-gray-700 bg-gray-50 outline-none focus:ring-2 focus:ring-[#1E88E5]"
                    >
                      <option value="">すべての区 (All Wards)</option>
                      <option value="門司区">門司区</option>
                      <option value="小倉北区">小倉北区</option>
                      <option value="小倉南区">小倉南区</option>
                      <option value="若松区">若松区</option>
                      <option value="八幡東区">八幡東区</option>
                      <option value="八幡西区">八幡西区</option>
                      <option value="戸畑区">戸畑区</option>
                      <option value="その他">その他</option>
                    </select>

                    <select 
                      value={filterSource} 
                      onChange={e => setFilterSource(e.target.value)} 
                      className="p-2 border border-gray-200 rounded-lg text-sm font-bold text-gray-700 bg-gray-50 outline-none focus:ring-2 focus:ring-[#1E88E5]"
                    >
                      <option value="">すべての情報源 (All Sources)</option>
                      <option value="教育方針について">教育方針について</option>
                      <option value="費用">費用</option>
                      <option value="その他">その他</option>
                    </select>

                    {(filterProgram || filterWard || filterSource || searchQuery) && (
                      <button onClick={clearFilters} className="text-sm font-bold text-red-500 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 transition-colors">
                        Clear All
                      </button>
                    )}
                  </div>
                </div>

                <div className="bg-white shadow-sm rounded-2xl border border-gray-200 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-50 border-b border-gray-200 text-xs font-bold text-gray-500 uppercase tracking-wider">
                          <th className="p-4">Contact Details</th>
                          <th className="p-4">Trial & Program</th>
                          <th className="p-4 hidden md:table-cell">Source & Notes</th>
                          <th className="p-4 text-center">Actions</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {filteredProfiles.length > 0 ? (
                          filteredProfiles.map(profile => (
                            <tr key={profile.id} className="hover:bg-gray-50 transition-colors">
                              <td className="p-4 cursor-pointer" onClick={() => setProfilesToPrint([profile])}>
                                <div className="font-black text-gray-800 text-base">{profile.parentName || '-'}</div>
                                <div className="text-sm font-bold text-[#1E88E5] mt-0.5">Child: {profile.childNameAge || '-'}</div>
                                <div className="text-xs text-gray-500 font-medium mt-1 flex flex-col">
                                  <span>{profile.email}</span>
                                  <span>{profile.phone}</span>
                                </div>
                              </td>
                              <td className="p-4 cursor-pointer align-top" onClick={() => setProfilesToPrint([profile])}>
                                <div className="flex flex-col gap-1.5 items-start">
                                  {profile.trialDate && (
                                    <span className="text-xs font-bold text-gray-600 flex items-center gap-1">
                                      <CalendarIcon className="w-3 h-3" /> {profile.trialDate}
                                    </span>
                                  )}
                                  <span className="text-xs font-bold bg-blue-50 text-blue-700 border border-blue-100 px-2 py-1 rounded inline-block w-max">
                                    {profile.program || 'No Program Set'}
                                  </span>
                                  {profile.ward && <span className="text-xs text-gray-500">Ward: {profile.ward}</span>}
                                </div>
                              </td>
                              <td className="p-4 hidden md:table-cell align-top cursor-pointer" onClick={() => setProfilesToPrint([profile])}>
                                <div className="flex flex-col gap-1.5">
                                  <span className="text-[10px] font-bold bg-purple-50 text-purple-700 border border-purple-100 px-2 py-0.5 rounded inline-block w-max uppercase tracking-wider">
                                    Source: {profile.source === 'その他' && profile.sourceOther ? `その他 (${profile.sourceOther})` : (profile.source || 'Unknown')}
                                  </span>
                                  <div className="text-xs text-gray-600 line-clamp-2 font-medium">
                                    {profile.interests || profile.requests || profile.notes || <span className="italic text-gray-400">No notes provided</span>}
                                  </div>
                                </div>
                              </td>
                              <td className="p-4 text-center align-middle">
                                <div className="flex justify-center items-center gap-1">
                                  <button onClick={() => setProfilesToPrint([profile])} className="p-2 text-gray-500 hover:text-[#1E88E5] hover:bg-blue-50 rounded-lg transition-colors" title="View & Print Profile">
                                    <PrinterIcon />
                                  </button>
                                  <button onClick={() => handleEdit(profile)} className="p-2 text-gray-500 hover:text-[#1E88E5] hover:bg-blue-50 rounded-lg transition-colors" title="Edit Profile">
                                    <EditIcon />
                                  </button>
                                  <button onClick={() => handleDelete(profile.id, profile.parentName)} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Delete Profile">
                                    <Trash2Icon />
                                  </button>
                                </div>
                              </td>
                            </tr>
                          ))
                        ) : (
                          <tr>
                            <td colSpan="4" className="p-12 text-center text-gray-500 font-bold bg-white">
                              No profiles matching your current filters.
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* --- PRINT MODAL / VIEW PROFILE(S) --- */}
          {profilesToPrint && profilesToPrint.length > 0 && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-8 bg-gray-900/60 backdrop-blur-sm modal-enter modal-backdrop-print" onClick={() => setProfilesToPrint(null)}>
              
              {/* Modal Container */}
              <div 
                className="bg-white w-full max-w-3xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden relative print-modal-content"
                onClick={e => e.stopPropagation()}
              >
                {/* Print/Close Action Bar (Hidden in Print) */}
                <div className="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center no-print shrink-0">
                  <h2 className="font-black text-gray-800 flex items-center gap-2">
                    <FileTextIcon /> 
                    {profilesToPrint.length > 1 ? `Print Profiles (${profilesToPrint.length})` : 'Profile View'}
                  </h2>
                  <div className="flex items-center gap-3">
                    <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-[#1E88E5] text-white font-bold rounded-lg hover:bg-blue-600 transition shadow-sm text-sm">
                      <PrinterIcon className="w-4 h-4" /> 
                      {profilesToPrint.length > 1 ? 'Print All (A4)' : 'Print A4 Profile'}
                    </button>
                    <button onClick={() => setProfilesToPrint(null)} className="p-2 text-gray-400 hover:text-gray-700 hover:bg-gray-200 rounded-full transition-colors">
                      <XIcon />
                    </button>
                  </div>
                </div>

                {/* Printable Content Area (Scrolls in UI, strict block layout in print) */}
                <div className="p-8 sm:p-12 overflow-y-auto bg-white print-scroll-container">
                  
                  {profilesToPrint.map((profile, index) => (
                    <div 
                      key={profile.id || index} 
                      className={`print-a4-page ${index < profilesToPrint.length - 1 ? 'mb-16 border-b-8 border-gray-200 pb-16 print:border-0 print:mb-0 print:pb-0' : ''}`}
                    >
                      {/* Print Header (Fixed height) */}
                      <div className="flex justify-between items-end border-b-2 border-gray-800 print-border-b pb-4 mb-6 print:mb-4 shrink-0">
                        <div>
                          <h1 className="text-3xl font-black text-gray-900 print-text-black tracking-tight">Lead Profile</h1>
                          <p className="text-sm font-bold text-gray-500 print-text-black mt-1">ABC Garden • Created: {formatDate(profile.dateCreated)}</p>
                        </div>
                      </div>

                      {/* Profile Data Table / Grid - Takes remaining space */}
                      <div className="border-2 border-gray-800 print-border flex flex-col text-sm print:text-[13px] print-text-black print-flex-1 overflow-hidden">
                        
                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            氏名 (Parent Name)
                          </div>
                          <div className="w-2/3 p-3 font-black text-lg">
                            {profile.parentName || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            お子さまのお名前・年齢 (Child Name & Age)
                          </div>
                          <div className="w-2/3 p-3 font-black text-lg text-[#1E88E5] print-text-black">
                            {profile.childNameAge || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            メールアドレス (Email)
                      </div>
                          <div className="w-2/3 p-3 font-bold break-all">
                            {profile.email || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            電話番号 (Phone Number)
                          </div>
                          <div className="w-2/3 p-3 font-bold">
                            {profile.phone || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            連絡方法 (Contact Method)
                          </div>
                          <div className="w-2/3 p-3 font-bold">
                            {profile.contactMethod || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            希望体験日 (Trial Date)
                          </div>
                          <div className="w-2/3 p-3 font-black text-gray-900">
                            {profile.trialDate || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            希望プログラム (Program)
                          </div>
                          <div className="w-2/3 p-3 font-black text-gray-900">
                            {profile.program || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            希望セッション (Session)
                          </div>
                          <div className="w-2/3 p-3 font-black text-gray-900">
                            {profile.session || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            お住まいの区 (Ward)
                          </div>
                          <div className="w-2/3 p-3 font-bold">
                            {profile.ward || '-'}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r flex items-center">
                            情報源 (Source)
                          </div>
                          <div className="w-2/3 p-3 font-bold">
                            {profile.source === 'その他' && profile.sourceOther 
                              ? `その他 (${profile.sourceOther})` 
                              : (profile.source || '-')}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r">
                            知りたい内容 (Interests)
                          </div>
                          <div className="w-2/3 p-3 font-medium whitespace-pre-wrap min-h-[40px]">
                            {profile.interests}
                          </div>
                        </div>

                        <div className="flex border-b-2 border-gray-800 print-border-b shrink-0">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r">
                            ご希望やご質問 (Requests/Questions)
                          </div>
                          <div className="w-2/3 p-3 font-medium whitespace-pre-wrap min-h-[40px]">
                            {profile.requests}
                          </div>
                        </div>

                        {/* Final Flex-Grow Notes Section */}
                        <div className="flex flex-1 print-flex-1">
                          <div className="w-1/3 bg-gray-100 print-bg-gray p-3 font-bold border-r-2 border-gray-800 print-border-r">
                            その他 (Internal Notes)
                          </div>
                          <div className="w-2/3 p-3 font-medium whitespace-pre-wrap h-full flex flex-col min-h-[100px]">
                            <div className="text-gray-800 flex-1">{profile.notes}</div>
                            {/* Subtle instruction text visible only on screen, hidden on print */}
                            {!profile.notes && (
                              <div className="text-gray-300 italic text-sm no-print mt-auto">
                                (This box will automatically expand to fill the bottom of the A4 page when printed, leaving room for handwritten notes.)
                              </div>
                            )}
                          </div>
                        </div>

                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
